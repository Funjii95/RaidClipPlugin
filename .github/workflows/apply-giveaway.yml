      - name: Tests ausführen
        shell: pwsh
        working-directory: RaidClipPlugin
        run: dotnet test "Tests\RaidClipPlugin.Tests.csproj" -c Release
      - name: Anwendung bauen
        shell: pwsh
        working-directory: RaidClipPlugin
        run: dotnet build "RaidClipPlugin.csproj" -c Release --no-restore
      - name: Änderungen veröffentlichen
        shell: pwsh
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add RaidClipPlugin .github/workflows/apply-giveaway.yml
          git commit -m "Giveaways und Clip-Discord-Modul hinzufügen"
          git push
