name: Fix gamble range reply

on:
  workflow_dispatch:
  push:
    paths:
      - ".github/workflows/fix-gamble-range-reply.yml"

permissions:
  contents: write

jobs:
  apply:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"

      - name: Patch gamble feedback
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          $scriptBase64 = ""
          $script = [System.Text.Encoding]::UTF8.GetString([System.Convert]::FromBase64String($scriptBase64))
          Set-Content -Path fix_gamble_range_reply.py -Value $script -Encoding UTF8
          python fix_gamble_range_reply.py
          Remove-Item fix_gamble_range_reply.py

      - name: Build
        shell: pwsh
        run: dotnet build "RaidClipPlugin\RaidClipPlugin.csproj" -c Release

      - name: Tests
        shell: pwsh
        run: dotnet test "RaidClipPlugin\Tests\RaidClipPlugin.Tests.csproj" -c Release

      - name: Commit changes
        shell: pwsh
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add RaidClipPlugin/Services/ChatMinigameService.cs RaidClipPlugin/Tests/GambleStakeRangeReplyTests.cs RaidClipPlugin/RaidClipPlugin.csproj
          if (git diff --cached --quiet) { Write-Host "No changes to commit"; exit 0 }
          git commit -m "Fix gamble range feedback"
          git push
