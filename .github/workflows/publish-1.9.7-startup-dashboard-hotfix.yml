name: Publish 1.9.7 Startup Dashboard Hotfix

on:
  workflow_dispatch:
  push:
    paths:
      - '.github/workflows/publish-1.9.7-startup-dashboard-hotfix.yml'

permissions:
  contents: write

env:
  VERSION: 1.9.7

jobs:
  release:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Apply hotfix
        shell: pwsh
        run: |
          @'
          from pathlib import Path
          import re
          
          root = Path('RaidClipPlugin')
          
          def read(path: Path) -> str:
              return path.read_text(encoding='utf-8-sig')
          
          def write(path: Path, text: str) -> None:
              path.write_text(text, encoding='utf-8')
          
          main_path = root / 'MainForm.cs'
          main = read(main_path)
          
          old_music_chat = '''                if (config.MusicRequests.Enabled && _musicRequests is not null)
                          {
                                                  _chatModeration.MessageReceived += message =>
                    {
                        if (!_commandRegistry.IsCommandEnabledForMessage(message.Text))
                            return Task.CompletedTask;
                        return _musicRequests.ProcessChatMessageAsync(
                            message, cancellationToken);
                    };
                          }
          '''
          new_music_chat = '''                var musicRequestsRuntimeActive =
                              config.MusicRequests.Enabled && _musicRequests is not null;
          
                          if (musicRequestsRuntimeActive && _musicRequests is not null)
                          {
                              _chatModeration.MessageReceived += message =>
                              {
                                  if (!_commandRegistry.IsCommandEnabledForMessage(message.Text))
                                      return Task.CompletedTask;
                                  return _musicRequests.ProcessChatMessageAsync(
                                      message, cancellationToken);
                              };
                          }
          '''
          if old_music_chat not in main:
              raise RuntimeError('Music chat handler block not found')
          main = main.replace(old_music_chat, new_music_chat)
          
          old_event_block = '''                if ((config.Minigame.PointsEnabled &&
                               (config.Minigame.FollowPointsEnabled ||
                                config.Minigame.SubPointsEnabled ||
                                config.Minigame.ChannelRewardPointsEnabled)) ||
                              config.MusicRequests.Enabled)
                          {
                              _minigameEvents = new MinigameEventService(
                                  config.Twitch.ClientId, session.AccessToken,
                                  _broadcaster.Id, session.UserId, config.Minigame,
                                  config.MusicRequests.Enabled
                                      ? config.MusicRequests.SelectedRewardId : "");
                              if (_minigame is not null)
                              {
                                  _minigameEvents.EventReceived += passiveEvent =>
                                      _minigame.ProcessPassiveEventAsync(
                                          passiveEvent, cancellationToken);
                              }
                              if (_musicRequests is not null)
                              {
                                  _minigameEvents.MusicRedemptionReceived += redemption =>
                                      _musicRequests.EnqueueAsync(
                                          redemption, cancellationToken);
                                  _minigameEvents.Activated += () =>
                                      SetSpotifyStatus(_spotify?.IsConnected == true
                                          ? "Verbunden · EventSub aktiv"
                                          : "EventSub aktiv · Spotify fehlt",
                                          _spotify?.IsConnected == true
                                              ? ActiveColor : WaitingColor);
                              }
                              _minigameEventTask = _minigameEvents.RunAsync(
                                  cancellationToken);
                              ObserveMinigameTask(_minigameEventTask);
                          }
          '''
          new_event_block = '''                var passiveMinigameEventsEnabled =
                              config.Minigame.PointsEnabled &&
                              (config.Minigame.FollowPointsEnabled ||
                               config.Minigame.SubPointsEnabled ||
                               config.Minigame.ChannelRewardPointsEnabled);
          
                          if (passiveMinigameEventsEnabled || musicRequestsRuntimeActive)
                          {
                              _minigameEvents = new MinigameEventService(
                                  config.Twitch.ClientId, session.AccessToken,
                                  _broadcaster.Id, session.UserId, config.Minigame,
                                  musicRequestsRuntimeActive
                                      ? config.MusicRequests.SelectedRewardId : "");
                              if (_minigame is not null)
                              {
                                  _minigameEvents.EventReceived += passiveEvent =>
                                      _minigame.ProcessPassiveEventAsync(
                                          passiveEvent, cancellationToken);
                              }
                              if (musicRequestsRuntimeActive && _musicRequests is not null)
                              {
                                  _minigameEvents.MusicRedemptionReceived += redemption =>
                                      _musicRequests.EnqueueAsync(
                                          redemption, cancellationToken);
                                  _minigameEvents.Activated += () =>
                                      SetSpotifyStatus(_spotify?.IsConnected == true
                                          ? "Verbunden · EventSub aktiv"
                                          : "EventSub aktiv · Spotify fehlt",
                                          _spotify?.IsConnected == true
                                              ? ActiveColor : WaitingColor);
                              }
                              _minigameEventTask = _minigameEvents.RunAsync(
                                  cancellationToken);
                              ObserveMinigameTask(_minigameEventTask);
                          }
          '''
          if old_event_block not in main:
              raise RuntimeError('Shared minigame/music EventSub block not found')
          main = main.replace(old_event_block, new_event_block)
          write(main_path, main)
          
          dash_path = root / 'MainForm.DashboardModern.cs'
          dash = read(dash_path)
          
          dash = dash.replace('''        layout.ColumnStyles.Add(new ColumnStyle(SizeType.Percent, 64));
                  layout.ColumnStyles.Add(new ColumnStyle(SizeType.Percent, 36));
          ''', '''        layout.ColumnStyles.Add(new ColumnStyle(SizeType.Percent, 58));
                  layout.ColumnStyles.Add(new ColumnStyle(SizeType.Percent, 42));
          ''')
          dash = dash.replace('''            MinimumSize = new Size(360, 92)''', '''            MinimumSize = new Size(420, 92)''')
          dash = dash.replace('''        layout.ColumnStyles.Add(new ColumnStyle(SizeType.Percent, 34));
                  layout.ColumnStyles.Add(new ColumnStyle(SizeType.Percent, 66));''', '''        layout.ColumnStyles.Add(new ColumnStyle(SizeType.Absolute, 112));
                  layout.ColumnStyles.Add(new ColumnStyle(SizeType.Percent, 100));''')
          dash = dash.replace('''        CompactDashboardButton(_updateButton, 170);
                  CompactDashboardButton(_changelogButton, 142);
                  CompactDashboardButton(_installUpdateButton, 150);
                  CompactDashboardButton(_skipUpdateButton, 112);''', '''        CompactDashboardButton(_updateButton, 160);
                  CompactDashboardButton(_changelogButton, 132);
                  CompactDashboardButton(_installUpdateButton, 140);
                  CompactDashboardButton(_skipUpdateButton, 104);''')
          dash = dash.replace('''        page.RowStyles.Add(new RowStyle(SizeType.Absolute, 104));
                  page.RowStyles.Add(new RowStyle(SizeType.Absolute, 122));
                  page.RowStyles.Add(new RowStyle(SizeType.Absolute, 112));
                  page.RowStyles.Add(new RowStyle(SizeType.Absolute, 74));
                  page.RowStyles.Add(new RowStyle(SizeType.Percent, 100));''', '''        page.RowStyles.Add(new RowStyle(SizeType.Absolute, 104));
                  page.RowStyles.Add(new RowStyle(SizeType.Absolute, 102));
                  page.RowStyles.Add(new RowStyle(SizeType.Absolute, 94));
                  page.RowStyles.Add(new RowStyle(SizeType.Absolute, 86));
                  page.RowStyles.Add(new RowStyle(SizeType.Percent, 100));''')
          dash = dash.replace('''    private Control CreateDashboardActionBar(Control actions)
              {
                  actions.Dock = DockStyle.Fill;
                  actions.Margin = Padding.Empty;
                  if (actions is FlowLayoutPanel flow)
                  {
                      flow.AutoScroll = false;
                      flow.WrapContents = false;
                      flow.Padding = Padding.Empty;
                      flow.Margin = Padding.Empty;
                      foreach (Control child in flow.Controls)
                      {
                          child.Margin = new Padding(4, 2, 4, 2);
                          if (child is Button button)
                          {
                              button.AutoSize = false;
                              button.Width = Math.Min(Math.Max(button.Width, 128), 168);
                              button.Height = 34;
                              button.Padding = new Padding(6, 0, 6, 0);
                          }
                          else if (child is TextBox textBox)
                          {
                              textBox.Width = Math.Min(Math.Max(textBox.Width, 150), 220);
                              textBox.Height = 30;
                          }
                      }
                  }
                  return CreateDashboardSection("Schnellaktionen", actions);
              }
          ''', '''    private Control CreateDashboardActionBar(Control actions)
              {
                  var host = new TableLayoutPanel
                  {
                      Dock = DockStyle.Fill,
                      ColumnCount = 7,
                      RowCount = 1,
                      BackColor = SurfaceColor,
                      Margin = Padding.Empty,
                      Padding = Padding.Empty
                  };
                  host.ColumnStyles.Add(new ColumnStyle(SizeType.Percent, 13));
                  host.ColumnStyles.Add(new ColumnStyle(SizeType.Percent, 15));
                  host.ColumnStyles.Add(new ColumnStyle(SizeType.Percent, 15));
                  host.ColumnStyles.Add(new ColumnStyle(SizeType.Percent, 22));
                  host.ColumnStyles.Add(new ColumnStyle(SizeType.Percent, 13));
                  host.ColumnStyles.Add(new ColumnStyle(SizeType.Percent, 12));
                  host.ColumnStyles.Add(new ColumnStyle(SizeType.Percent, 10));
          
                  if (actions is FlowLayoutPanel flow)
                  {
                      flow.AutoScroll = false;
                      flow.WrapContents = false;
                      var orderedControls = flow.Controls.Cast<Control>().ToArray();
                      flow.Controls.Clear();
                      for (var index = 0; index < Math.Min(orderedControls.Length, host.ColumnCount); index++)
                      {
                          var child = orderedControls[index];
                          child.Dock = DockStyle.Fill;
                          child.Margin = new Padding(4, 3, 4, 3);
                          if (child is Button button)
                          {
                              button.AutoSize = false;
                              button.Height = 36;
                              button.Padding = new Padding(4, 0, 4, 0);
                          }
                          else if (child is TextBox textBox)
                          {
                              textBox.AutoSize = false;
                              textBox.Height = 32;
                          }
                          host.Controls.Add(child, index, 0);
                      }
                  }
                  else
                  {
                      actions.Dock = DockStyle.Fill;
                      host.Controls.Add(actions, 0, 0);
                      host.SetColumnSpan(actions, host.ColumnCount);
                  }
          
                  return CreateDashboardSection("Schnellaktionen", host);
              }
          ''')
          dash = dash.replace('''    private Control CreateDashboardHealthSummary()
              {
                  var layout = new TableLayoutPanel { Dock = DockStyle.Fill, ColumnCount = 1, RowCount = 4, BackColor = SurfaceColor, Margin = Padding.Empty, Padding = Padding.Empty };
                  layout.RowStyles.Add(new RowStyle(SizeType.Absolute, 24));
                  layout.RowStyles.Add(new RowStyle(SizeType.Absolute, 30));
                  layout.RowStyles.Add(new RowStyle(SizeType.Percent, 100));
                  layout.RowStyles.Add(new RowStyle(SizeType.Absolute, 18));
                  var summary = new FlowLayoutPanel { Dock = DockStyle.Fill, FlowDirection = FlowDirection.LeftToRight, WrapContents = false, AutoScroll = false, BackColor = SurfaceColor, Margin = Padding.Empty, Padding = Padding.Empty };
                  _moduleHealthOverallDot.Margin = new Padding(0, 5, 6, 0);
                  _moduleHealthSummaryLabel.AutoSize = true;
                  _moduleHealthSummaryLabel.Margin = new Padding(0, 2, 6, 0);
                  _moduleHealthProgressLabel.AutoSize = true;
                  _moduleHealthProgressLabel.Margin = new Padding(0, 2, 0, 0);
                  summary.Controls.Add(_moduleHealthOverallDot);
                  summary.Controls.Add(_moduleHealthSummaryLabel);
                  summary.Controls.Add(_moduleHealthProgressLabel);
                  layout.Controls.Add(summary, 0, 0);
                  var buttons = new TableLayoutPanel { Dock = DockStyle.Fill, ColumnCount = 2, RowCount = 1, BackColor = SurfaceColor, Margin = Padding.Empty, Padding = Padding.Empty };
                  buttons.ColumnStyles.Add(new ColumnStyle(SizeType.Percent, 50));
                  buttons.ColumnStyles.Add(new ColumnStyle(SizeType.Percent, 50));
                  CompactDashboardButton(_checkModulesButton, 110);
                  CompactDashboardButton(_restartModulesButton, 130);
                  _checkModulesButton.Dock = DockStyle.Fill;
                  _restartModulesButton.Dock = DockStyle.Fill;
                  _checkModulesButton.Margin = new Padding(0, 0, 5, 0);
                  _restartModulesButton.Margin = new Padding(5, 0, 0, 0);
                  buttons.Controls.Add(_checkModulesButton, 0, 0);
                  buttons.Controls.Add(_restartModulesButton, 1, 0);
                  layout.Controls.Add(buttons, 0, 1);
                  var states = new TableLayoutPanel { Dock = DockStyle.Fill, ColumnCount = 2, RowCount = 3, BackColor = SurfaceColor, Margin = Padding.Empty, Padding = new Padding(0, 3, 0, 0) };
                  states.ColumnStyles.Add(new ColumnStyle(SizeType.Percent, 50));
                  states.ColumnStyles.Add(new ColumnStyle(SizeType.Percent, 50));
                  for (var i = 0; i < 3; i++) states.RowStyles.Add(new RowStyle(SizeType.Percent, 33.3F));
                  var stateRows = new[] { "OBS bereit", "Chat bereit", "EventSub bereit", "Player bereit", "Commands", "Punkte" };
                  for (var i = 0; i < stateRows.Length; i++) states.Controls.Add(new Label { Text = stateRows[i], Dock = DockStyle.Fill, ForeColor = HealthyStatusColor, Font = new Font("Segoe UI", 7.8F, FontStyle.Bold), TextAlign = ContentAlignment.MiddleLeft, AutoEllipsis = true, Padding = new Padding(2, 0, 2, 0) }, i % 2, i / 2);
                  layout.Controls.Add(states, 0, 2);
                  _moduleHealthLastCheckLabel.Dock = DockStyle.Fill;
                  _moduleHealthLastCheckLabel.AutoSize = false;
                  _moduleHealthLastCheckLabel.TextAlign = ContentAlignment.MiddleRight;
                  _moduleHealthLastCheckLabel.Margin = Padding.Empty;
                  layout.Controls.Add(_moduleHealthLastCheckLabel, 0, 3);
                  return layout;
              }
          ''', '''    private Control CreateDashboardHealthSummary()
              {
                  var layout = new TableLayoutPanel
                  {
                      Dock = DockStyle.Fill,
                      ColumnCount = 1,
                      RowCount = 3,
                      BackColor = SurfaceColor,
                      Margin = Padding.Empty,
                      Padding = Padding.Empty
                  };
                  layout.RowStyles.Add(new RowStyle(SizeType.Absolute, 30));
                  layout.RowStyles.Add(new RowStyle(SizeType.Absolute, 34));
                  layout.RowStyles.Add(new RowStyle(SizeType.Percent, 100));
          
                  var summary = new FlowLayoutPanel
                  {
                      Dock = DockStyle.Fill,
                      FlowDirection = FlowDirection.LeftToRight,
                      WrapContents = false,
                      AutoScroll = false,
                      BackColor = SurfaceColor,
                      Margin = Padding.Empty,
                      Padding = Padding.Empty
                  };
                  _moduleHealthOverallDot.Margin = new Padding(0, 6, 6, 0);
                  _moduleHealthSummaryLabel.AutoSize = false;
                  _moduleHealthSummaryLabel.Width = 210;
                  _moduleHealthSummaryLabel.Height = 24;
                  _moduleHealthSummaryLabel.TextAlign = ContentAlignment.MiddleLeft;
                  _moduleHealthSummaryLabel.AutoEllipsis = true;
                  _moduleHealthProgressLabel.AutoSize = false;
                  _moduleHealthProgressLabel.Width = 90;
                  _moduleHealthProgressLabel.Height = 24;
                  _moduleHealthProgressLabel.TextAlign = ContentAlignment.MiddleRight;
                  _moduleHealthProgressLabel.AutoEllipsis = true;
                  summary.Controls.Add(_moduleHealthOverallDot);
                  summary.Controls.Add(_moduleHealthSummaryLabel);
                  summary.Controls.Add(_moduleHealthProgressLabel);
                  layout.Controls.Add(summary, 0, 0);
          
                  var buttons = new TableLayoutPanel
                  {
                      Dock = DockStyle.Fill,
                      ColumnCount = 2,
                      RowCount = 1,
                      BackColor = SurfaceColor,
                      Margin = Padding.Empty,
                      Padding = Padding.Empty
                  };
                  buttons.ColumnStyles.Add(new ColumnStyle(SizeType.Percent, 50));
                  buttons.ColumnStyles.Add(new ColumnStyle(SizeType.Percent, 50));
                  CompactDashboardButton(_checkModulesButton, 110);
                  CompactDashboardButton(_restartModulesButton, 130);
                  _checkModulesButton.Dock = DockStyle.Fill;
                  _restartModulesButton.Dock = DockStyle.Fill;
                  _checkModulesButton.Margin = new Padding(0, 0, 5, 0);
                  _restartModulesButton.Margin = new Padding(5, 0, 0, 0);
                  buttons.Controls.Add(_checkModulesButton, 0, 0);
                  buttons.Controls.Add(_restartModulesButton, 1, 0);
                  layout.Controls.Add(buttons, 0, 1);
          
                  var footer = new Panel { Dock = DockStyle.Fill, BackColor = SurfaceColor, Margin = Padding.Empty, Padding = Padding.Empty };
                  var essentials = new Label
                  {
                      Dock = DockStyle.Fill,
                      AutoSize = false,
                      ForeColor = MutedTextColor,
                      Font = new Font("Segoe UI", 8F),
                      TextAlign = ContentAlignment.MiddleLeft,
                      AutoEllipsis = true,
                      Text = "OBS · Chat · EventSub · Player · Commands · Punkte"
                  };
                  _moduleHealthLastCheckLabel.Dock = DockStyle.Bottom;
                  _moduleHealthLastCheckLabel.AutoSize = false;
                  _moduleHealthLastCheckLabel.Height = 18;
                  _moduleHealthLastCheckLabel.TextAlign = ContentAlignment.BottomRight;
                  footer.Controls.Add(essentials);
                  footer.Controls.Add(_moduleHealthLastCheckLabel);
                  layout.Controls.Add(footer, 0, 2);
                  return layout;
              }
          ''')
          write(dash_path, dash)
          
          csproj_path = root / 'RaidClipPlugin.csproj'
          csproj = read(csproj_path)
          csproj = re.sub(r'<Version>[^<]+</Version>', '<Version>1.9.7</Version>', csproj)
          csproj = re.sub(r'<FileVersion>[^<]+</FileVersion>', '<FileVersion>1.9.7.0</FileVersion>', csproj)
          write(csproj_path, csproj)
          
          print('Hotfix 1.9.7 angewendet.')
          
          '@ | Set-Content -Path apply_hotfix_197.py -Encoding UTF8
          python apply_hotfix_197.py

      - name: Build
        shell: pwsh
        run: dotnet build RaidClipPlugin/RaidClipPlugin.csproj -c Release

      - name: Commit patched source
        shell: pwsh
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add RaidClipPlugin/MainForm.cs RaidClipPlugin/MainForm.DashboardModern.cs RaidClipPlugin/RaidClipPlugin.csproj
          git commit -m "Fix startup and dashboard layout for 1.9.7" || echo "No source changes to commit"
          git push

      - name: Publish app
        shell: pwsh
        run: |
          dotnet publish RaidClipPlugin/RaidClipPlugin.csproj -c Release -r win-x64 --self-contained true -p:PublishSingleFile=true -p:EnableCompressionInSingleFile=true -o publish
          Compress-Archive -Path publish/* -DestinationPath "RaidClipPlugin-$env:VERSION-win-x64.zip" -Force

      - name: Build installer
        shell: pwsh
        run: |
          choco install innosetup -y --no-progress
          $iscc = "${env:ProgramFiles(x86)}\Inno Setup 6\ISCC.exe"
          & $iscc "/DMyAppVersion=$env:VERSION" "Installer\RaidClipPlugin.iss"
          $installer = Get-ChildItem -Path Installer -Recurse -Filter *.exe | Sort-Object LastWriteTime -Descending | Select-Object -First 1
          if (-not $installer) { throw "Installer wurde nicht erzeugt." }
          Copy-Item $installer.FullName "RaidClipPluginSetup-$env:VERSION.exe" -Force

      - name: Generate update metadata
        shell: pwsh
        run: |
          $zip = "RaidClipPlugin-$env:VERSION-win-x64.zip"
          $hash = (Get-FileHash $zip -Algorithm SHA256).Hash.ToLowerInvariant()
          $repo = "${{ github.repository }}"
          $download = "https://github.com/$repo/releases/download/v$env:VERSION/$zip"
          $meta = [ordered]@{
            latestVersion = $env:VERSION
            downloadUrl = $download
            changelog = "Hotfix: Pluginstart bleibt stabil, wenn Musikwünsche/Spotify nicht bereit sind. Healthcheck im Dashboard ist kompakter, Schnellaktionen sind wieder sichtbar."
            sha256 = $hash
          }
          $meta | ConvertTo-Json -Depth 4 | Set-Content -Path update.json -Encoding UTF8

      - name: Create GitHub release
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          $notes = "Hotfix 1.9.7`n`n- Pluginstart robuster gemacht: fehlende/fehlerhafte Musikwünsche starten den gemeinsamen EventSub-Teil nicht mehr unnötig mit.`n- Dashboard bereinigt: Healthcheck auf das Wesentliche reduziert.`n- Schnellaktionen wieder sichtbar und ohne abgeschnittene Scroll-Leiste angeordnet.`n- Update-Button/Update-Bereich bleibt erreichbar."
          gh release create "v$env:VERSION" "RaidClipPlugin-$env:VERSION-win-x64.zip" "RaidClipPluginSetup-$env:VERSION.exe" update.json --title "RaidClipPlugin v$env:VERSION" --notes $notes || gh release upload "v$env:VERSION" "RaidClipPlugin-$env:VERSION-win-x64.zip" "RaidClipPluginSetup-$env:VERSION.exe" update.json --clobber
