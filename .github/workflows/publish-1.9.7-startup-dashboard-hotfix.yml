name: Publish 1.9.7 Startup Dashboard Hotfix

on:
  workflow_dispatch:

permissions:
  contents: write

env:
  VERSION: 1.9.7

jobs:
  release:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Apply hotfix
        shell: pwsh
        run: |
          $patch = @'


'@
          [Text.Encoding]::UTF8.GetString([Convert]::FromBase64String($patch)) | Set-Content -Path apply_hotfix_197.py -Encoding UTF8
          python apply_hotfix_197.py

      - name: Build
        shell: pwsh
        run: dotnet build RaidClipPlugin/RaidClipPlugin.csproj -c Release

      - name: Commit patched source
        shell: pwsh
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add RaidClipPlugin/MainForm.cs RaidClipPlugin/MainForm.DashboardModern.cs RaidClipPlugin/RaidClipPlugin.csproj
          git commit -m "Fix startup and dashboard layout for 1.9.7" || echo "No source changes to commit"
          git push

      - name: Publish app
        shell: pwsh
        run: |
          dotnet publish RaidClipPlugin/RaidClipPlugin.csproj -c Release -r win-x64 --self-contained true -p:PublishSingleFile=true -p:EnableCompressionInSingleFile=true -o publish
          Compress-Archive -Path publish/* -DestinationPath "RaidClipPlugin-$env:VERSION-win-x64.zip" -Force

      - name: Build installer
        shell: pwsh
        run: |
          choco install innosetup -y --no-progress
          $iscc = "${env:ProgramFiles(x86)}\Inno Setup 6\ISCC.exe"
          & $iscc "/DMyAppVersion=$env:VERSION" "Installer\RaidClipPlugin.iss"
          $installer = Get-ChildItem -Path Installer -Recurse -Filter *.exe | Sort-Object LastWriteTime -Descending | Select-Object -First 1
          if (-not $installer) { throw "Installer wurde nicht erzeugt." }
          Copy-Item $installer.FullName "RaidClipPluginSetup-$env:VERSION.exe" -Force

      - name: Generate update metadata
        shell: pwsh
        run: |
          $zip = "RaidClipPlugin-$env:VERSION-win-x64.zip"
          $hash = (Get-FileHash $zip -Algorithm SHA256).Hash.ToLowerInvariant()
          $repo = "${{ github.repository }}"
          $download = "https://github.com/$repo/releases/download/v$env:VERSION/$zip"
          $meta = [ordered]@{
            latestVersion = $env:VERSION
            downloadUrl = $download
            changelog = "Hotfix: Pluginstart bleibt stabil, wenn Musikwünsche/Spotify nicht bereit sind. Healthcheck im Dashboard ist kompakter, Schnellaktionen sind wieder sichtbar."
            sha256 = $hash
          }
          $meta | ConvertTo-Json -Depth 4 | Set-Content -Path update.json -Encoding UTF8

      - name: Create GitHub release
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          $notes = @'
Hotfix 1.9.7

- Pluginstart robuster gemacht: fehlende/fehlerhafte Musikwünsche starten den gemeinsamen EventSub-Teil nicht mehr unnötig mit.
- Dashboard bereinigt: Healthcheck auf das Wesentliche reduziert.
- Schnellaktionen wieder sichtbar und ohne abgeschnittene Scroll-Leiste angeordnet.
- Update-Button/Update-Bereich bleibt erreichbar.
'@
          gh release create "v$env:VERSION" "RaidClipPlugin-$env:VERSION-win-x64.zip" "RaidClipPluginSetup-$env:VERSION.exe" update.json --title "RaidClipPlugin v$env:VERSION" --notes $notes || gh release upload "v$env:VERSION" "RaidClipPlugin-$env:VERSION-win-x64.zip" "RaidClipPluginSetup-$env:VERSION.exe" update.json --clobber
