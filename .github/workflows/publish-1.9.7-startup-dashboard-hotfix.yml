name: Publish 1.9.7 Startup Dashboard Hotfix

on:
  workflow_dispatch:
  push:
    paths:
      - '.github/workflows/publish-1.9.7-startup-dashboard-hotfix.yml'

permissions:
  contents: write

env:
  VERSION: 1.9.7

jobs:
  release:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Build
        shell: pwsh
        run: dotnet build RaidClipPlugin/RaidClipPlugin.csproj -c Release

      - name: Publish app
        shell: pwsh
        run: |
          Remove-Item -Recurse -Force RaidClipPlugin/publish -ErrorAction SilentlyContinue
          dotnet publish RaidClipPlugin/RaidClipPlugin.csproj -c Release -r win-x64 --self-contained true -p:PublishSingleFile=true -p:EnableCompressionInSingleFile=true -o RaidClipPlugin/publish
          Compress-Archive -Path RaidClipPlugin/publish/* -DestinationPath "RaidClipPlugin-$env:VERSION-win-x64.zip" -Force

      - name: Build installer
        shell: pwsh
        run: |
          choco install innosetup -y --no-progress
          $iscc = "${env:ProgramFiles(x86)}\Inno Setup 6\ISCC.exe"
          & $iscc "/DMyAppVersion=$env:VERSION" "RaidClipPlugin\Installer\RaidClipPlugin.iss"
          $installer = Get-ChildItem -Path RaidClipPlugin/installer-output -Filter *.exe | Sort-Object LastWriteTime -Descending | Select-Object -First 1
          if (-not $installer) { throw "Installer wurde nicht erzeugt." }
          Copy-Item $installer.FullName "RaidClipPluginSetup-$env:VERSION.exe" -Force

      - name: Generate update metadata
        shell: pwsh
        run: |
          $zip = "RaidClipPlugin-$env:VERSION-win-x64.zip"
          $hash = (Get-FileHash $zip -Algorithm SHA256).Hash.ToLowerInvariant()
          $repo = "${{ github.repository }}"
          $download = "https://github.com/$repo/releases/download/v$env:VERSION/$zip"
          $meta = [ordered]@{
            latestVersion = $env:VERSION
            downloadUrl = $download
            changelog = "Hotfix: Pluginstart bleibt stabil, wenn Musikwünsche/Spotify nicht bereit sind. Healthcheck im Dashboard ist kompakter, Schnellaktionen sind wieder sichtbar."
            sha256 = $hash
          }
          $meta | ConvertTo-Json -Depth 4 | Set-Content -Path update.json -Encoding UTF8

      - name: Create GitHub release
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          $notes = "Hotfix 1.9.7`n`n- Pluginstart robuster gemacht: fehlende/fehlerhafte Musikwünsche starten den gemeinsamen EventSub-Teil nicht mehr unnötig mit.`n- Dashboard bereinigt: Healthcheck auf das Wesentliche reduziert.`n- Schnellaktionen wieder sichtbar und ohne abgeschnittene Scroll-Leiste angeordnet.`n- Update-Button/Update-Bereich bleibt erreichbar."
          gh release create "v$env:VERSION" "RaidClipPlugin-$env:VERSION-win-x64.zip" "RaidClipPluginSetup-$env:VERSION.exe" update.json --title "RaidClipPlugin v$env:VERSION" --notes $notes || gh release upload "v$env:VERSION" "RaidClipPlugin-$env:VERSION-win-x64.zip" "RaidClipPluginSetup-$env:VERSION.exe" update.json --clobber
