name: Apply modern dashboard v2.3 shell

on:
  workflow_dispatch:
  push:
    paths:
      - ".github/workflows/apply-modern-dashboard-v23.yml"

permissions:
  contents: write

jobs:
  apply:
    runs-on: windows-latest
    steps:
      - name: Quellcode laden
        uses: actions/checkout@v4

      - name: .NET 10 einrichten
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"

      - name: GUI-Patch anwenden
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          $scriptBase64 = ""
          $script = [System.Text.Encoding]::UTF8.GetString([System.Convert]::FromBase64String($scriptBase64))
          Set-Content -Path apply_modern_dashboard_v23.py -Value $script -Encoding UTF8
          python apply_modern_dashboard_v23.py
          Remove-Item apply_modern_dashboard_v23.py

      - name: Build
        run: dotnet build "RaidClipPlugin\RaidClipPlugin.csproj" -c Release

      - name: Tests
        run: dotnet test "RaidClipPlugin\Tests\RaidClipPlugin.Tests.csproj" -c Release

      - name: Änderungen committen
        shell: pwsh
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add RaidClipPlugin/MainForm.cs RaidClipPlugin/MainForm.ModernShell.cs RaidClipPlugin/MainForm.DashboardModern.cs RaidClipPlugin/MainForm.Themes.cs RaidClipPlugin/RaidClipPlugin.csproj
          if (git diff --cached --quiet) { Write-Host "No changes to commit"; exit 0 }
          git commit -m "Modernize dashboard shell UI"
          git push
