          }
          '''

          write(root / "MainForm.DashboardModern.cs", dashboard)

          main_path = root / "MainForm.cs"
          main = read(main_path)
          old = '''        var dashboardLayout = CreateModernDashboardLayout(
            CreateDashboardHeader(header, updatePanel),
            CreateDashboardIndicatorGrid(_obsIndicator, _twitchIndicator, _eventSubIndicator, _playerIndicator),
            CreateDashboardActionBar(actions),
            dashboardHealth);
          '''
          new = '''        var dashboardLayout = CreateModernDashboardLayout(
            CreateDashboardHeader(header, updatePanel),
            CreateDashboardIndicatorGrid(_obsIndicator, _twitchIndicator, _eventSubIndicator, _playerIndicator),
            CreateDashboardActionBar(actions),
            CreateDashboardHealthSummary());
          '''
          if old not in main:
              raise SystemExit("Dashboard layout call not found")
          main = main.replace(old, new)

          # Dashboard should never show the large health grid or nested scroll bars.
          main = main.replace("_moduleHealthGrid.AutoScroll = false;", "_moduleHealthGrid.AutoScroll = true;")
          main = main.replace("AutoScroll = false,\n        Padding = new Padding(0, 4, 0, 4),", "AutoScroll = false,\n        Padding = new Padding(0, 0, 0, 0),")

          write(main_path, main)

          shell_path = root / "MainForm.ModernShell.cs"
          shell = read(shell_path)
          if "private TableLayoutPanel? _modernSidebarShell;" not in shell:
              shell = shell.replace("private TableLayoutPanel? _modernRootLayout;", "private TableLayoutPanel? _modernRootLayout;\n    private TableLayoutPanel? _modernSidebarShell;")
          shell = shell.replace("var shell = new TableLayoutPanel", "_modernSidebarShell = new TableLayoutPanel")
          shell = shell.replace("shell.Dock = DockStyle.Fill;", "_modernSidebarShell.Dock = DockStyle.Fill;")
          shell = shell.replace("shell.BackColor = SidebarColor;", "_modernSidebarShell.BackColor = SidebarColor;")
          shell = shell.replace("shell.ColumnCount = 1;", "_modernSidebarShell.ColumnCount = 1;")
          shell = shell.replace("shell.RowCount = 2;", "_modernSidebarShell.RowCount = 2;")
          shell = shell.replace("shell.RowStyles.Add(new RowStyle(SizeType.Percent, 100));", "_modernSidebarShell.RowStyles.Add(new RowStyle(SizeType.Percent, 100));")
          shell = shell.replace("shell.RowStyles.Add(new RowStyle(SizeType.Absolute, 88));", "_modernSidebarShell.RowStyles.Add(new RowStyle(SizeType.Absolute, 88));")
          shell = shell.replace("shell.Controls.Add(navigation, 0, 0);", "_modernSidebarShell.Controls.Add(navigation, 0, 0);")
          shell = shell.replace("shell.Controls.Add(statusCard, 0, 1);", "_modernSidebarShell.Controls.Add(statusCard, 0, 1);")
          shell = shell.replace("return shell;", "return _modernSidebarShell;")
          shell = shell.replace("var compact = ClientSize.Width < 1360 || ClientSize.Height < 820;", "var compact = ClientSize.Width < 1500 || ClientSize.Height < 900;")
          shell = shell.replace("button.Width = compact ? 50 : 236;\n                button.Height = compact ? 44 : 54;", "button.Width = compact ? 42 : 236;\n                button.Height = compact ? 34 : 50;")
          shell = shell.replace("control.Visible = !compact || ClientSize.Height >= 740;", "control.Visible = !compact && ClientSize.Height >= 740;")
          if "_modernSidebarShell.RowStyles[1].Height = compact ? 0 : 88;" not in shell:
              shell = shell.replace("foreach (Control control in _modernSidebarFlow.Controls)", "if (_modernSidebarShell?.RowStyles.Count > 1)\n        {\n            _modernSidebarShell.RowStyles[1].Height = compact ? 0 : 88;\n        }\n\n        foreach (Control control in _modernSidebarFlow.Controls)")
          write(shell_path, shell)

          csproj_path = root / "RaidClipPlugin.csproj"
          csproj = read(csproj_path)
          csproj = csproj.replace("<Version>1.9.2</Version>", "<Version>1.9.3</Version>")
          csproj = csproj.replace("<FileVersion>1.9.2.0</FileVersion>", "<FileVersion>1.9.3.0</FileVersion>")
          write(csproj_path, csproj)
          '@
          Set-Content -Path patch-standard-layout.py -Value $script -Encoding UTF8
          python patch-standard-layout.py

      - name: Build
        shell: pwsh
        run: dotnet build "RaidClipPlugin/RaidClipPlugin.csproj" -c Release

      - name: Tests
        shell: pwsh
        run: dotnet test "RaidClipPlugin/Tests/RaidClipPlugin.Tests.csproj" -c Release

      - name: Ã„nderungen committen
        shell: pwsh
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add RaidClipPlugin/MainForm.DashboardModern.cs RaidClipPlugin/MainForm.cs RaidClipPlugin/MainForm.ModernShell.cs RaidClipPlugin/RaidClipPlugin.csproj
          git diff --cached --quiet
          if ($LASTEXITCODE -eq 0) {
            Write-Host "Keine Ã„nderungen zu committen."
            exit 0
          }
          git commit -m "Fix dashboard clipping at standard resolution"
          git push
