name: Release 1.5.9 Duel

on:
  push:
    branches: [main]
    paths:
      - .github/workflows/release-1.5.9-duel.yml

permissions:
  contents: write
  actions: write

jobs:
  test-release:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'
      - name: Apply version 1.5.9 Duel sources
        shell: pwsh
        env:
          PAYLOAD: 
        run: |
          @'
          import os, base64, gzip, json, pathlib
          files = json.loads(gzip.decompress(base64.b64decode(os.environ["PAYLOAD"])).decode("utf-8"))
          for name, content in files.items():
              path = pathlib.Path(name)
              path.parent.mkdir(parents=True, exist_ok=True)
              path.write_text(content, encoding="utf-8", newline="")
          twitch_path = pathlib.Path("RaidClipPlugin/Services/TwitchService.cs")
          twitch = twitch_path.read_text(encoding="utf-8")
          if "IDuelTwitchClient" not in twitch:
              marker = "public sealed class TwitchService : "
              line_start = twitch.index(marker)
              line_end = twitch.index("\n", line_start)
              twitch = twitch[:line_end] + ", IDuelTwitchClient" + twitch[line_end:]
              twitch_path.write_text(twitch, encoding="utf-8", newline="")
          print(f"Applied {len(files)} files and connected TwitchService to Duel")
          '@ | python -
      - name: Restore
        run: dotnet restore "RaidClipPlugin/Tests/RaidClipPlugin.Tests.csproj"
      - name: Build
        run: dotnet build "RaidClipPlugin/RaidClipPlugin.csproj" -c Release --no-restore
      - name: Test existing and Duel suite
        run: dotnet test "RaidClipPlugin/Tests/RaidClipPlugin.Tests.csproj" -c Release --no-restore --logger "console;verbosity=normal"
      - name: Commit version 1.5.9
        shell: pwsh
        run: |
          Remove-Item -LiteralPath ".github/workflows/release-1.5.9-duel.yml" -Force
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Version 1.5.9: Duel-Minispiel"
          git push origin main
          git tag -a v1.5.9 -m "RaidClipPlugin 1.5.9"
          git push origin v1.5.9
      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        shell: pwsh
        run: |
          gh release create v1.5.9 --title "RaidClipPlugin 1.5.9" --notes "Neues Duel-Minispiel mit !duel, !accept und !deny. Enthält sichere Punkte-Reservierung und Pot-Auszahlung, Rückerstattung bei Ablehnung, Timeout oder Bot-Stopp, FairMode, All-In, Rollen und Cooldowns, frei konfigurierbare Chattexte, Live-Status, Testmodus sowie Integration in CommandRegistry, Commands-Seite und !commands."
      - name: Build installer and update package
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh workflow run release.yml --ref v1.5.9
