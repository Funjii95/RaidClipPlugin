name: Release 1.7.1 gamble all final

on:
  push:
    paths:
      - ".github/workflows/fix-gamble-all-1.7.1b.yml"
  workflow_dispatch:

permissions:
  contents: write
  actions: write

jobs:
  fix-release:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"

      - name: Apply robust gamble all fix
        shell: pwsh
        run: |
          $nl = [Environment]::NewLine
          $servicePath = "RaidClipPlugin/Services/ChatMinigameService.cs"
          $service = Get-Content $servicePath -Raw
          $service = $service -replace "\r?\n\s*public const int MaximumAllInStake = 10_000_000;\r?\n", $nl
          $service = $service.Replace("Math.Min(MaximumAllInStake, Math.Max(0L, availablePoints))", "Math.Min(int.MaxValue, Math.Max(0L, availablePoints))")
          if ($service.Contains("MaximumAllInStake") -or $service.Contains("10_000_000")) {
            throw "Gamble all cap was not removed from ChatMinigameService."
          }
          Set-Content $servicePath $service -Encoding UTF8

          $testPath = "RaidClipPlugin/Tests/GambleOverflowTests.cs"
          $tests = Get-Content $testPath -Raw
          $tests = $tests.Replace("GambleAllNeverExceedsTenMillion", "GambleAllUsesAllAvailablePointsWithinIntegerRange")
          $tests = $tests.Replace("[InlineData(50_000_000, 10_000_000)]", "[InlineData(50_000_000, 50_000_000)]")
          if (-not $tests.Contains("2_147_483_648L")) {
            $insert = "[InlineData(50_000_000, 50_000_000)]" + $nl + "    [InlineData(2_147_483_647L, int.MaxValue)]" + $nl + "    [InlineData(2_147_483_648L, int.MaxValue)]"
            $tests = $tests.Replace("[InlineData(50_000_000, 50_000_000)]", $insert)
          }
          if (-not $tests.Contains("[InlineData(50_000_000, 50_000_000)]")) {
            throw "Gamble all full-balance regression test was not updated."
          }
          Set-Content $testPath $tests -Encoding UTF8

          $projectPath = "RaidClipPlugin/RaidClipPlugin.csproj"
          $project = Get-Content $projectPath -Raw
          $project = $project.Replace("<Version>1.7.0</Version>", "<Version>1.7.1</Version>")
          $project = $project.Replace("<FileVersion>1.7.0.0</FileVersion>", "<FileVersion>1.7.1.0</FileVersion>")
          $project = $project.Replace("<AssemblyVersion>1.7.0.0</AssemblyVersion>", "<AssemblyVersion>1.7.1.0</AssemblyVersion>")
          if (-not $project.Contains("<Version>1.7.1</Version>")) { throw "Project version was not bumped to 1.7.1." }
          Set-Content $projectPath $project -Encoding UTF8

      - name: Run tests
        shell: pwsh
        run: dotnet test "RaidClipPlugin/Tests/RaidClipPlugin.Tests.csproj" -c Release

      - name: Commit, tag and trigger Windows release
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git rm --ignore-unmatch .github/workflows/fix-gamble-all-1.7.1.yml .github/workflows/fix-gamble-all-1.7.1b.yml
          git add RaidClipPlugin/Services/ChatMinigameService.cs RaidClipPlugin/Tests/GambleOverflowTests.cs RaidClipPlugin/RaidClipPlugin.csproj
          git commit -m "Release 1.7.1: restore gamble all full balance"
          git push origin main
          git tag -f v1.7.1
          git push origin v1.7.1 --force
          gh workflow run release.yml --ref v1.7.1
