name: Publish 1.9.6 Update Button Hotfix Build Only

on:
  workflow_dispatch:
  push:
    paths:
      - '.github/workflows/publish-1.9.6-update-button-hotfix-build.yml'

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: windows-latest
    steps:
      - name: Quellcode laden
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: .NET 10 einrichten
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"

      - name: Hotfix anwenden
        shell: pwsh
        run: |
          $scriptBase64 = ""
          [IO.File]::WriteAllBytes("patch-196.py", [Convert]::FromBase64String($scriptBase64))
          python patch-196.py

      - name: Build prüfen
        shell: pwsh
        run: dotnet build "RaidClipPlugin/RaidClipPlugin.csproj" -c Release

      - name: Änderungen committen
        shell: pwsh
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add RaidClipPlugin
          git diff --cached --quiet
          if ($LASTEXITCODE -eq 0) {
            Write-Host "Keine Änderungen zu committen."
          } else {
            git commit -m "Restore dashboard update buttons"
            git push
          }

      - name: Windows-App erstellen
        shell: pwsh
        working-directory: RaidClipPlugin
        run: dotnet publish "RaidClipPlugin.csproj" -c Release -r win-x64 --self-contained true -p:PublishSingleFile=true -p:EnableCompressionInSingleFile=true -o "publish"

      - name: Update-ZIP erstellen
        shell: pwsh
        working-directory: RaidClipPlugin
        run: |
          $version = "1.9.6"
          New-Item -ItemType Directory -Force "installer-output" | Out-Null
          Compress-Archive -Path "publish\*" -DestinationPath "installer-output\RaidClipPlugin-Update-$version.zip" -Force

      - name: Inno Setup installieren
        shell: pwsh
        run: choco install innosetup -y --no-progress

      - name: Windows-Installer erstellen
        shell: pwsh
        working-directory: RaidClipPlugin
        run: '& "${env:ProgramFiles(x86)}\Inno Setup 6\ISCC.exe" "/DMyAppVersion=1.9.6" "Installer\RaidClipPlugin.iss"'

      - name: update.json erzeugen
        shell: pwsh
        working-directory: RaidClipPlugin
        run: |
          $version = "1.9.6"
          $zipName = "RaidClipPlugin-Update-$version.zip"
          $zipPath = Join-Path "installer-output" $zipName
          $hash = (Get-FileHash $zipPath -Algorithm SHA256).Hash
          $releaseTag = "v$version"
          $downloadUrl = "https://github.com/${{ github.repository }}/releases/download/$releaseTag/$zipName"
          $manifest = [ordered]@{
            latestVersion = $version
            downloadUrl = $downloadUrl
            changelog = "Hotfix: Update-Karte im Dashboard zeigt wieder alle Aktionen an: Nach Updates suchen, Changelog, Update installieren und Überspringen."
            sha256 = $hash
          }
          $manifest | ConvertTo-Json | Set-Content "installer-output\update.json" -Encoding UTF8

      - name: GitHub Release veröffentlichen
        shell: pwsh
        working-directory: RaidClipPlugin
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          $version = "1.9.6"
          $tag = "v$version"
          gh release view $tag --json tagName 2>$null
          if ($LASTEXITCODE -ne 0) {
            gh release create $tag --title "RaidClipPlugin $version" --notes "Hotfix: Update-Karte im Dashboard zeigt wieder alle Aktionen an: Nach Updates suchen, Changelog, Update installieren und Überspringen."
          }
          gh release upload $tag "installer-output\RaidClipPlugin-Setup-$version.exe" "installer-output\RaidClipPlugin-Update-$version.zip" "installer-output\update.json" --clobber
