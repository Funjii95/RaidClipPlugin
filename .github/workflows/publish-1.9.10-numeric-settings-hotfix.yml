name: Publish 1.9.10 Numeric Settings Hotfix

on:
  workflow_dispatch:
  push:
    paths:
      - '.github/workflows/publish-1.9.10-numeric-settings-hotfix.yml'

permissions:
  contents: write

env:
  VERSION: '1.9.10'

jobs:
  build_release:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

