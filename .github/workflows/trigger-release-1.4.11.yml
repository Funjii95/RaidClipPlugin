name: Trigger Release 1.4.11

on:
  push:
    paths:
      - ".github/workflows/trigger-release-1.4.11.yml"

permissions:
  actions: write
  contents: write

jobs:
  trigger:
    runs-on: ubuntu-latest
    steps:
      - name: Release-Workflow für Tag starten
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh workflow run release.yml --repo Funjii95/RaidClipPlugin --ref v1.4.11
