name: Apply Auto Discord Clip Poster

on:
  push:
    branches: [main]
    paths:
      - .github/workflows/apply-auto-discord-clip-poster.yml

permissions:
  contents: write

jobs:
  apply:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'
      - name: Apply Auto Discord Clip Poster module
        shell: pwsh
        env:
          BASE_COMMIT: 35f9dc49584746004c6d5f07a575d579fe962d0c
          PAYLOAD: 
        run: |
          $head = git rev-parse HEAD
          if ($head -ne $env:BASE_COMMIT) {
            throw "Repo changed since requested base commit. Expected $env:BASE_COMMIT but found $head. Aborting to avoid overwriting newer work."
          }
          @'
          import os, base64, gzip, json, pathlib
          files = json.loads(gzip.decompress(base64.b64decode(os.environ["PAYLOAD"])).decode("utf-8"))
          for name, content in files.items():
              path = pathlib.Path(name)
              path.parent.mkdir(parents=True, exist_ok=True)
              path.write_text(content, encoding="utf-8", newline="")
          print(f"Applied {len(files)} files for Auto Discord Clip Poster")
          '@ | python -
      - name: Restore
        run: dotnet restore "RaidClipPlugin/Tests/RaidClipPlugin.Tests.csproj"
      - name: Build
        run: dotnet build "RaidClipPlugin/RaidClipPlugin.csproj" -c Release --no-restore
      - name: Test
        run: dotnet test "RaidClipPlugin/Tests/RaidClipPlugin.Tests.csproj" -c Release --no-restore --logger "console;verbosity=normal"
      - name: Commit changes
        shell: pwsh
        run: |
          Remove-Item -LiteralPath ".github/workflows/apply-auto-discord-clip-poster.yml" -Force
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Add Auto Discord Clip Poster module"
          git push origin main
