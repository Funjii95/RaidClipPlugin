name: Release 1.5.7 Startup Fix

on:
  push:
    branches: [main]
    paths:
      - .github/workflows/release-1.5.7-startup-fix.yml

permissions:
  contents: write
  actions: write

jobs:
  diagnose-test-release:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'
      - name: Apply version 1.5.7 startup fix
        shell: pwsh
        env:
          PAYLOAD: 
        run: |
          @'
          import os, base64, gzip, json, pathlib
          files = json.loads(gzip.decompress(base64.b64decode(os.environ["PAYLOAD"])).decode("utf-8"))
          for name, content in files.items():
              path = pathlib.Path(name)
              path.parent.mkdir(parents=True, exist_ok=True)
              path.write_text(content, encoding="utf-8", newline="")
          print(f"Applied {len(files)} files")
          '@ | python -
      - name: Restore
        run: dotnet restore "RaidClipPlugin/Tests/RaidClipPlugin.Tests.csproj"
      - name: Build
        run: dotnet build "RaidClipPlugin/RaidClipPlugin.csproj" -c Release --no-restore
      - name: Test including GUI startup smoke test
        run: dotnet test "RaidClipPlugin/Tests/RaidClipPlugin.Tests.csproj" -c Release --no-restore --logger "console;verbosity=normal"
      - name: Commit version 1.5.7
        shell: pwsh
        run: |
          Remove-Item -LiteralPath ".github/workflows/release-1.5.7-startup-fix.yml" -Force
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Version 1.5.7: Startfehler der Commands-Ansicht beheben"
          git push origin main
          git tag -a v1.5.7 -m "RaidClipPlugin 1.5.7"
          git push origin v1.5.7
      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        shell: pwsh
        run: |
          gh release create v1.5.7 --title "RaidClipPlugin 1.5.7" --notes "Behebt den Startabsturz aus Version 1.5.6: Die Commands-Tabelle verwendet nun von Anfang an eine echte Checkbox-Spalte und die Modulfilter-Aktualisierung ist gegen rekursive Ereignisse geschützt. Zusätzlich schreibt RaidClipPlugin Startfehler künftig in ein Diagnose-Log und besitzt einen automatisierten GUI-Starttest."
      - name: Build installer and update package
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh workflow run release.yml --ref v1.5.7
