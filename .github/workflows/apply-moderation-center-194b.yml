name: Apply moderation center 1.9.4b

on:
  workflow_dispatch:
  push:
    paths:
      - '.github/workflows/apply-moderation-center-194b.yml'

permissions:
  contents: write

jobs:
  apply:
    runs-on: windows-latest
    steps:
      - name: Quellcode laden
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: .NET 10 einrichten
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Moderationscenter anwenden
        shell: pwsh
        run: |
          $workflow = Get-Content ".github/workflows/apply-moderation-center-194.yml" -Raw
          $match = [regex]::Match($workflow, '\$scriptBase64 = "([A-Za-z0-9+/=]+)"')
          if (-not $match.Success) { throw "Patch-Script im Workflow 1.9.4 nicht gefunden." }
          [IO.File]::WriteAllBytes("patch-moderation-center.py", [Convert]::FromBase64String($match.Groups[1].Value))
          python patch-moderation-center.py

      - name: Chatmoderation-Fix anwenden
        shell: pwsh
        run: |
          $fix = @'
          from pathlib import Path
          
          path = Path("RaidClipPlugin/MainForm.cs")
          text = path.read_text(encoding="utf-8-sig")
          start_marker = "    private async Task HandleChatMessageAsync("
          end_marker = "\n\n    private void AddChatMessage("
          start = text.index(start_marker)
          end = text.index(end_marker, start)
          replacement = """    private async Task HandleChatMessageAsync(
                  ChatMessage message,
                  AppConfig config,
                  TwitchService twitch,
                  string broadcasterId,
                  string broadcasterLogin,
                  string moderatorId,
                  CancellationToken cancellationToken)
              {
                  AddChatMessage(message);
          
                  if (config.Moderation.ShowMessagesInLog)
                  {
                      AppendLog($"[Chat] {message.UserName}: {message.Text}");
                  }
          
                  var handledByModerationCenter = await ProcessModerationCenterAsync(
                      message,
                      config,
                      twitch,
                      broadcasterId,
                      broadcasterLogin,
                      moderatorId,
                      cancellationToken);
                  if (handledByModerationCenter ||
                      message.CommandAuthorization == CommandAuthorization.Denied)
                  {
                      return;
                  }
          
                  if (!config.Moderation.AutoFilterEnabled ||
                      string.IsNullOrWhiteSpace(message.Text))
                  {
                      return;
                  }
          
                  if (config.Moderation.WhitelistModsAndVips && message.IsWhitelisted)
                  {
                      return;
                  }
          
                  var blockedWord = config.Moderation.BlockedWords.FirstOrDefault(word =>
                      ContainsBlockedWord(message.Text, word));
          
                  if (blockedWord is null || _chatModeration is null)
                  {
                      return;
                  }
          
                  message.CommandAuthorization = CommandAuthorization.Denied;
                  try
                  {
                      await _chatModeration.DeleteMessageAsync(
                          message.Id,
                          cancellationToken);
                      AppendLog(
                          $"Wortfilter: Nachricht von {message.UserName} wegen " +
                          $"‚{blockedWord}‘ gelöscht.");
                  }
                  catch (OperationCanceledException)
                      when (cancellationToken.IsCancellationRequested)
                  {
                  }
                  catch (Exception exception)
                  {
                      AppendLog(
                          "Wortfilter konnte Nachricht nicht löschen: " +
                          exception.Message);
                  }
              }
          """
          text = text[:start] + replacement + text[end:]
          if "ProcessModerationCenterAsync" not in text:
              raise RuntimeError("Moderationscenter-Aufruf fehlt nach Fix.")
          path.write_text(text, encoding="utf-8")
          print("Chatmoderation-Fix angewendet.")
          '@
          Set-Content -Path "fix-moderation-center.py" -Value $fix -Encoding UTF8
          python fix-moderation-center.py

      - name: Build
        shell: pwsh
        run: dotnet build "RaidClipPlugin/RaidClipPlugin.csproj" -c Release

      - name: Tests
        shell: pwsh
        run: dotnet test "RaidClipPlugin/Tests/RaidClipPlugin.Tests.csproj" -c Release

      - name: Aenderungen committen
        shell: pwsh
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add RaidClipPlugin
          git diff --cached --quiet
          if ($LASTEXITCODE -eq 0) {
            Write-Host "Keine Aenderungen zu committen."
            exit 0
          }
          git commit -m "Add Twitch moderation center link filter"
          git push
