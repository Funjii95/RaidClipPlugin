name: Release 1.6.9 Shared Chat Security

on:
  push:
    branches: [main]
    paths:
      - .github/workflows/release-1.6.9-security.yml

permissions:
  contents: write
  actions: write

jobs:
  test-release:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'
      - name: Apply version 1.6.9 sources
        shell: pwsh
        env:
          PAYLOAD: 
        run: |
          @'
          import os, base64, gzip, json, pathlib
          files = json.loads(gzip.decompress(base64.b64decode(os.environ["PAYLOAD"])).decode("utf-8"))
          for name, content in files.items():
              path = pathlib.Path(name)
              path.parent.mkdir(parents=True, exist_ok=True)
              path.write_text(content, encoding="utf-8", newline="")
          print(f"Applied {len(files)} files")
          '@ | python -
      - name: Restore
        run: dotnet restore "RaidClipPlugin/Tests/RaidClipPlugin.Tests.csproj"
      - name: Build application
        run: dotnet build "RaidClipPlugin/RaidClipPlugin.csproj" -c Release --no-restore
      - name: Run all tests
        run: dotnet test "RaidClipPlugin/Tests/RaidClipPlugin.Tests.csproj" -c Release --no-restore --logger "console;verbosity=normal"
      - name: Commit version 1.6.9
        shell: pwsh
        run: |
          Remove-Item -LiteralPath ".github/workflows/release-1.6.9-security.yml" -Force
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Version 1.6.9: Shared-Chat-Schutz und Duel-Timeout"
          git push origin main
          git tag -a v1.6.9 -m "RaidClipPlugin 1.6.9"
          git push origin v1.6.9
      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        shell: pwsh
        run: |
          gh release create v1.6.9 --title "RaidClipPlugin 1.6.9" --notes "Zentrale Shared-Chat-Sicherheitslogik: Befehle aus fremden Stream-Together-Kanälen bleiben im Livechat sichtbar, werden aber vor Autorisierung, Cooldowns und allen Modulen verworfen. Neue optionale Einstellung unter Commands. Zusätzlich kann der Verlierer eines Duells optional für eine einstellbare Dauer mit frei wählbarem Grund getimeoutet werden. Twitch-Fehler beim Timeout werden nur protokolliert und beeinflussen die Punkteauszahlung nicht. Enthält automatisierte Sicherheits- und Duelltests."
      - name: Build installer and update package
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh workflow run release.yml --ref v1.6.9
