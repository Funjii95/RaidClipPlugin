      - name: Build
        shell: pwsh
        run: dotnet build RaidClipPlugin/RaidClipPlugin.csproj -c Release

      - name: Commit source changes
        shell: pwsh
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add RaidClipPlugin/MainForm.DashboardModern.cs RaidClipPlugin/RaidClipPlugin.csproj
          git commit -m "Fix dashboard layout sizing for 1.9.18" || echo "No source changes to commit"
          git push

      - name: Publish app
        shell: pwsh
        run: |
          Remove-Item -Recurse -Force RaidClipPlugin/publish -ErrorAction SilentlyContinue
          dotnet publish RaidClipPlugin/RaidClipPlugin.csproj -c Release -r win-x64 --self-contained true -p:PublishSingleFile=true -p:EnableCompressionInSingleFile=true -o RaidClipPlugin/publish
          Compress-Archive -Path RaidClipPlugin/publish/* -DestinationPath "RaidClipPlugin-$env:VERSION-win-x64.zip" -Force

      - name: Build installer
        shell: pwsh
        run: |
          choco install innosetup -y --no-progress
          $programFilesX86 = [Environment]::GetFolderPath('ProgramFilesX86')
          $iscc = Join-Path (Join-Path $programFilesX86 'Inno Setup 6') 'ISCC.exe'
          & $iscc "/DMyAppVersion=$env:VERSION" "RaidClipPlugin/Installer/RaidClipPlugin.iss"
          $installer = Get-ChildItem -Path RaidClipPlugin/installer-output -Filter *.exe | Sort-Object LastWriteTime -Descending | Select-Object -First 1
          if (-not $installer) { throw "Installer wurde nicht erzeugt." }
          Copy-Item $installer.FullName "RaidClipPluginSetup-$env:VERSION.exe" -Force

      - name: Create update.json
        shell: pwsh
        run: |
          $zip = "RaidClipPlugin-$env:VERSION-win-x64.zip"
          $hash = (Get-FileHash $zip -Algorithm SHA256).Hash.ToLowerInvariant()
          $downloadUrl = "https://github.com/Funjii95/RaidClipPlugin/releases/download/v$env:VERSION/$zip"
          $json = [ordered]@{
            latestVersion = $env:VERSION
            downloadUrl = $downloadUrl
            changelog = "Dashboard Layout repariert: Schnellaktionen haben wieder normale Button-Größen, Texte bleiben sichtbar und der freie Platz wird sauber genutzt."
            sha256 = $hash
          } | ConvertTo-Json -Depth 4
          Set-Content -Path update.json -Value $json -Encoding UTF8

      - name: Create GitHub release
        shell: pwsh
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          $tag = "v$env:VERSION"
          git fetch --tags
          if (-not (git tag --list $tag)) {
            git tag $tag
            git push origin $tag
          }
          $notes = @"
          RaidClipPlugin $env:VERSION

          - Dashboard-Layout repariert.
          - Schnellaktionen sind wieder normale Buttons statt riesiger Kacheln.
          - Texte und Bereiche werden wieder sauber lesbar angezeigt.
          - ZIP-Update-Paket, Installer und update.json werden veröffentlicht.
          "@
          gh release view $tag *> $null
          if ($LASTEXITCODE -ne 0) {
            gh release create $tag --title "RaidClipPlugin v$env:VERSION" --notes $notes
          } else {
            gh release edit $tag --title "RaidClipPlugin v$env:VERSION" --notes $notes
          }
          gh release upload $tag "RaidClipPlugin-$env:VERSION-win-x64.zip" "RaidClipPluginSetup-$env:VERSION.exe" update.json --clobber
