      - name: Verify patch markers
        shell: pwsh
        run: |
          $main = Get-Content RaidClipPlugin/MainForm.cs -Raw
          $config = Get-Content RaidClipPlugin/Services/ConfigurationService.cs -Raw
          $mini = Get-Content RaidClipPlugin/Services/ChatMinigameService.cs -Raw
          if (-not $main.Contains('SyncMinigameCommandOverrides(config);')) { throw 'MainForm does not sync minigame command overrides.' }
          if (-not $main.Contains('return _minigame.ProcessMessageAsync(')) { throw 'Minigame message routing missing.' }
          if (-not $config.Contains('SynchronizeMinigameCommandOverrides(config);')) { throw 'Configuration normalize does not heal command overrides.' }
          if (-not $mini.Contains('Commands-Rechteverwaltung deaktiviert')) { throw 'Missing disabled-command diagnostic log.' }

      - name: Build
        shell: pwsh
        run: dotnet build RaidClipPlugin/RaidClipPlugin.csproj -c Release

      - name: Commit source changes
        shell: pwsh
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add RaidClipPlugin/MainForm.cs RaidClipPlugin/Services/ConfigurationService.cs RaidClipPlugin/Services/ChatMinigameService.cs RaidClipPlugin/RaidClipPlugin.csproj
          if (git diff --cached --quiet) {
            echo "No source changes to commit."
          } else {
            git commit -m "Fix gamble command sync and routing for 1.9.42"
            git push
          }

      - name: Publish app
        shell: pwsh
        run: |
          dotnet publish RaidClipPlugin/RaidClipPlugin.csproj -c Release -r win-x64 --self-contained true -p:PublishSingleFile=true -p:IncludeNativeLibrariesForSelfExtract=true -o RaidClipPlugin/publish
          Compress-Archive -Path RaidClipPlugin/publish/* -DestinationPath "RaidClipPlugin-$env:VERSION-win-x64.zip" -Force

      - name: Build installer
        shell: pwsh
        run: |
          choco install innosetup -y --no-progress
          $programFilesX86 = [Environment]::GetFolderPath('ProgramFilesX86')
          $iscc = Join-Path (Join-Path $programFilesX86 'Inno Setup 6') 'ISCC.exe'
          if (Test-Path 'RaidClipPlugin/Installer/RaidClipPlugin.iss') {
            & $iscc "/DMyAppVersion=$env:VERSION" "RaidClipPlugin/Installer/RaidClipPlugin.iss"
            Copy-Item "RaidClipPlugin/installer-output/RaidClipPlugin-Setup-$env:VERSION.exe" "RaidClipPluginSetup-$env:VERSION.exe" -Force
          }

      - name: Create update manifest
        shell: pwsh
        run: |
          $zip = "RaidClipPlugin-$env:VERSION-win-x64.zip"
          $sha = (Get-FileHash $zip -Algorithm SHA256).Hash.ToLowerInvariant()
          $manifest = [ordered]@{
            latestVersion = $env:VERSION
            downloadUrl = "https://github.com/Funjii95/RaidClipPlugin/releases/download/v$env:VERSION/$zip"
            changelog = "Hotfix 1.9.42: !gamble wird nicht mehr vor dem Minigame-Service still verworfen. Beim Aktivieren von Minigames/Gamble werden die passenden Command-Haken automatisch synchronisiert und alte falsche Overrides repariert."
            sha256 = $sha
          }
          $manifest | ConvertTo-Json -Depth 4 | Set-Content -Path update.json -Encoding UTF8

      - name: Create release
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          $tag = "v$env:VERSION"
          $notes = @(
            "Hotfix 1.9.42",
            "",
            "- !gamble wird nicht mehr von der äußeren CommandRegistry still geschluckt, bevor der Minigame-Service ihn sieht.",
            "- Wenn Minigames/Gamble aktiviert sind, werden die entsprechenden Haken in Commands automatisch gesetzt: casino.gamble und weitere Punkte-/Casino-Commands.",
            "- Alte settings.json mit casino.gamble=false wird beim Laden normalisiert, sobald Gamble aktiv ist.",
            "- Falls ein Command wirklich deaktiviert ist, steht jetzt eine klare Logzeile statt nur Schweigen.",
            "",
            "Test: Spiele aktivieren + !gamble aktivieren, speichern, App neu starten, !gamble 100 senden. Danach sollte entweder Gamble laufen oder eine konkrete Cooldown/Punkte/Range-Antwort kommen."
          ) -join [Environment]::NewLine
          git tag -f $tag
          git push origin $tag --force
          gh release delete $tag -y --cleanup-tag 2>$null || $true
          $assets = @("RaidClipPlugin-$env:VERSION-win-x64.zip", "update.json")
          if (Test-Path "RaidClipPluginSetup-$env:VERSION.exe") { $assets += "RaidClipPluginSetup-$env:VERSION.exe" }
          gh release create $tag @assets --title "RaidClipPlugin $env:VERSION" --notes $notes
