name: Publish 1.9.36 Settings Save Repair

on:
  push:
    branches: [main]
    paths:
      - '.github/workflows/publish-1.9.34-settings-persistence-final.yml'
  workflow_dispatch:

permissions:
  contents: write
  actions: read

env:
  VERSION: '1.9.36'

jobs:
  release:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'
          dotnet-quality: preview

      - name: Patch settings persistence
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          @'
          from pathlib import Path
          import re

          version = "1.9.36"

          def write(path, text):
              Path(path).write_text(text, encoding="utf-8")

          csproj_path = Path("RaidClipPlugin/RaidClipPlugin.csproj")
          csproj = csproj_path.read_text(encoding="utf-8")
          csproj = re.sub(r"<Version>[^<]+</Version>", f"<Version>{version}</Version>", csproj)
          csproj = re.sub(r"<FileVersion>[^<]+</FileVersion>", f"<FileVersion>{version}.0</FileVersion>", csproj)
          if re.search(r"<AssemblyVersion>[^<]+</AssemblyVersion>", csproj):
              csproj = re.sub(r"<AssemblyVersion>[^<]+</AssemblyVersion>", f"<AssemblyVersion>{version}.0</AssemblyVersion>", csproj)
          else:
              csproj = csproj.replace(
                  f"<FileVersion>{version}.0</FileVersion>",
                  f"<FileVersion>{version}.0</FileVersion>\n    <AssemblyVersion>{version}.0</AssemblyVersion>")
          write(csproj_path, csproj)

          config_path = Path("RaidClipPlugin/Services/ConfigurationService.cs")
          text = config_path.read_text(encoding="utf-8")

          if "private static void ValidateCommandsSettings(AppConfig config)" not in text:
              text = text.replace(
                  "    public static void ValidateDuelSettings(DuelConfig duel)\n    {\n        var commands = new[] { duel.DuelCommand, duel.AcceptCommand, duel.DenyCommand };",
                  "    public static void ValidateDuelSettings(DuelConfig duel)\n    {\n        if (!duel.Enabled)\n        {\n            return;\n        }\n\n        var commands = new[] { duel.DuelCommand, duel.AcceptCommand, duel.DenyCommand };")

              text = text.replace(
                  "    public static void ValidateHeistAndCommands(AppConfig config)\n    {\n        var heist = config.Heist;\n        if (heist.MinimumParticipants < 3)",
                  "    public static void ValidateHeistAndCommands(AppConfig config)\n    {\n        var heist = config.Heist;\n        if (!heist.Enabled)\n        {\n            ValidateCommandsSettings(config);\n            return;\n        }\n\n        if (heist.MinimumParticipants < 3)")

              text = text.replace(
                  "\n\n        var commands = config.Commands;\n        if (string.IsNullOrWhiteSpace(commands.Command))",
                  "\n\n        ValidateCommandsSettings(config);\n    }\n\n    private static void ValidateCommandsSettings(AppConfig config)\n    {\n        var commands = config.Commands;\n        if (string.IsNullOrWhiteSpace(commands.Command))",
                  1)

              text = text.replace(
                  "    public static void ValidateGiveawaySettings(GiveawayConfig config)\n    {\n        if (string.IsNullOrWhiteSpace(config.Title) ||",
                  "    public static void ValidateGiveawaySettings(GiveawayConfig config)\n    {\n        if (!config.Enabled)\n        {\n            return;\n        }\n\n        if (string.IsNullOrWhiteSpace(config.Title) ||")

          music_old = '''        var musicCommands = new[]
        {
            (config.MusicRequests.ModeratorCommands.SongEnabled,
                config.MusicRequests.ModeratorCommands.Song),
            (config.MusicRequests.ModeratorCommands.SkipEnabled,
                config.MusicRequests.ModeratorCommands.Skip),
            (config.MusicRequests.ModeratorCommands.QueueEnabled,
                config.MusicRequests.ModeratorCommands.Queue),
            (config.MusicRequests.ModeratorCommands.RemoveEnabled,
                config.MusicRequests.ModeratorCommands.Remove),
            (config.MusicRequests.ModeratorCommands.PauseEnabled,
                config.MusicRequests.ModeratorCommands.Pause),
            (config.MusicRequests.ModeratorCommands.ResumeEnabled,
                config.MusicRequests.ModeratorCommands.Resume)
        }.Where(item => item.Item1).Select(item => item.Item2);'''
          music_new = '''        IEnumerable<string> musicCommands = config.MusicRequests.Enabled
            ? new[]
              {
                  (config.MusicRequests.ModeratorCommands.SongEnabled,
                      config.MusicRequests.ModeratorCommands.Song),
                  (config.MusicRequests.ModeratorCommands.SkipEnabled,
                      config.MusicRequests.ModeratorCommands.Skip),
                  (config.MusicRequests.ModeratorCommands.QueueEnabled,
                      config.MusicRequests.ModeratorCommands.Queue),
                  (config.MusicRequests.ModeratorCommands.RemoveEnabled,
                      config.MusicRequests.ModeratorCommands.Remove),
                  (config.MusicRequests.ModeratorCommands.PauseEnabled,
                      config.MusicRequests.ModeratorCommands.Pause),
                  (config.MusicRequests.ModeratorCommands.ResumeEnabled,
                      config.MusicRequests.ModeratorCommands.Resume)
              }.Where(item => item.Item1).Select(item => item.Item2)
            : Enumerable.Empty<string>();'''
          if music_old in text:
              text = text.replace(music_old, music_new)

          clip_old = '''        var clipCommands = new[] { config.ClipCommand.Command }
            .Concat(config.ClipCommand.Aliases);'''
          clip_new = '''        IEnumerable<string> clipCommands = config.ClipCommand.Enabled
            ? new[] { config.ClipCommand.Command }
                .Concat(config.ClipCommand.Aliases)
            : Enumerable.Empty<string>();'''
          if clip_old in text:
              text = text.replace(clip_old, clip_new)

          giveaway_old = "        var giveawayCommands = GetGiveawayCommands(config.Giveaways);"
          giveaway_new = '''        var giveawayCommands = config.Giveaways.Enabled
            ? GetGiveawayCommands(config.Giveaways)
            : Enumerable.Empty<string>();'''
          if giveaway_old in text:
              text = text.replace(giveaway_old, giveaway_new)

          config_path.write_text(text, encoding="utf-8")
          '@ | Set-Content -Path patch-settings-save.py -Encoding UTF8
          python patch-settings-save.py

      - name: Build
        shell: pwsh
        run: dotnet build RaidClipPlugin/RaidClipPlugin.csproj -c Release

      - name: Commit source changes
        shell: pwsh
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add RaidClipPlugin/Services/ConfigurationService.cs RaidClipPlugin/RaidClipPlugin.csproj
          if (git diff --cached --quiet) {
            echo "No source changes to commit."
          } else {
            git commit -m "Fix settings persistence validation for 1.9.36"
            git push
          }

      - name: Publish app
        shell: pwsh
        run: |
          dotnet publish RaidClipPlugin/RaidClipPlugin.csproj -c Release -r win-x64 --self-contained true -p:PublishSingleFile=true -p:IncludeNativeLibrariesForSelfExtract=true -o RaidClipPlugin/publish
          Compress-Archive -Path RaidClipPlugin/publish/* -DestinationPath "RaidClipPlugin-$env:VERSION-win-x64.zip" -Force

      - name: Build installer
        shell: pwsh
        run: |
          choco install innosetup -y --no-progress
          $programFilesX86 = [Environment]::GetFolderPath('ProgramFilesX86')
          $iscc = Join-Path (Join-Path $programFilesX86 'Inno Setup 6') 'ISCC.exe'
          if (Test-Path 'RaidClipPlugin/Installer/RaidClipPlugin.iss') {
            & $iscc "/DMyAppVersion=$env:VERSION" "RaidClipPlugin/Installer/RaidClipPlugin.iss"
            Copy-Item "RaidClipPlugin/installer-output/RaidClipPlugin-Setup-$env:VERSION.exe" "RaidClipPluginSetup-$env:VERSION.exe" -Force
          }

      - name: Create update manifest
        shell: pwsh
        run: |
          $zip = "RaidClipPlugin-$env:VERSION-win-x64.zip"
          $sha = (Get-FileHash $zip -Algorithm SHA256).Hash.ToLowerInvariant()
          $manifest = [ordered]@{
            latestVersion = $env:VERSION
            downloadUrl = "https://github.com/Funjii95/RaidClipPlugin/releases/download/v$env:VERSION/$zip"
            changelog = "Hotfix 1.9.36: Einstellungen speichern wieder zuverlässig. Deaktivierte Module blockieren das Speichern nicht mehr, alte leere Standardtexte werden repariert."
            sha256 = $sha
          }
          $manifest | ConvertTo-Json -Depth 4 | Set-Content -Path update.json -Encoding UTF8

      - name: Create release
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          $tag = "v$env:VERSION"
          $notes = @(
            "Hotfix 1.9.36",
            "",
            "- Einstellungen werden beim Speichern nicht mehr durch deaktivierte/kaputte Module blockiert.",
            "- Heist, Duel und Giveaway validieren nur noch hart, wenn sie aktiv sind.",
            "- Command-Kollisionsprüfung ignoriert deaktivierte Musik-, Clip- und Giveaway-Commands.",
            "- Leere Standardtexte werden beim Normalisieren weiter repariert.",
            "",
            "Bitte nach Installation einmal eine Einstellung ändern, speichern, App schließen und neu öffnen."
          ) -join [Environment]::NewLine
          git tag -f $tag
          git push origin $tag --force
          gh release delete $tag -y --cleanup-tag 2>$null || $true
          $assets = @("RaidClipPlugin-$env:VERSION-win-x64.zip", "update.json")
          if (Test-Path "RaidClipPluginSetup-$env:VERSION.exe") { $assets += "RaidClipPluginSetup-$env:VERSION.exe" }
          gh release create $tag @assets --title "RaidClipPlugin $env:VERSION" --notes $notes
