name: Publish 1.9.35 Auto Update Recovery

on:
  push:
    branches: [main]
    paths:
      - '.github/workflows/publish-1.9.34-settings-persistence-final.yml'
  workflow_dispatch:

permissions:
  contents: write
  actions: read

env:
  VERSION: '1.9.35'

jobs:
  release:
    runs-on: windows-latest
    steps:
