name: Publish 1.9.45 Heist Duel Persistence Fix

on:
  push:
    branches: [main]
    paths:
      - '.github/workflows/publish-1.9.34-settings-persistence-final.yml'
  workflow_dispatch:

permissions:
  contents: write
  actions: read

env:
  VERSION: '1.9.45'

jobs:
  release:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'
          dotnet-quality: preview

      - name: Patch Heist and Duel save paths
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          @'
          from pathlib import Path
          import re

          VERSION = '1.9.45'

          def read(path):
              return Path(path).read_text(encoding='utf-8-sig')

          def write(path, text):
              Path(path).write_text(text, encoding='utf-8')

          def require(condition, message):
              if not condition:
                  raise SystemExit(message)

          csproj = 'RaidClipPlugin/RaidClipPlugin.csproj'
          text = read(csproj)
          text = re.sub(r'<Version>[^<]+</Version>', f'<Version>{VERSION}</Version>', text)
          text = re.sub(r'<FileVersion>[^<]+</FileVersion>', f'<FileVersion>{VERSION}.0</FileVersion>', text)
          text = re.sub(r'<AssemblyVersion>[^<]+</AssemblyVersion>', f'<AssemblyVersion>{VERSION}.0</AssemblyVersion>', text)
          write(csproj, text)

          duel_path = 'RaidClipPlugin/MainForm.Duel.cs'
          text = read(duel_path)
          text = text.replace('_duelSaveButton.Click += (_, _) => SaveMinigameSettingsFromControls();', '_duelSaveButton.Click += (_, _) => SaveDuelSettingsFromControls();')
          if 'private async void SaveDuelSettingsFromControls()' not in text:
              marker = '    private void OnDuelStatusChanged(DuelStatus status)\n'
              method = '''    private static void VerifyDuelSettingsPersisted(DuelConfig expected, DuelConfig actual)
    {
        if (expected.Enabled != actual.Enabled ||
            !string.Equals(expected.DuelCommand, actual.DuelCommand, StringComparison.OrdinalIgnoreCase) ||
            !string.Equals(expected.AcceptCommand, actual.AcceptCommand, StringComparison.OrdinalIgnoreCase) ||
            !string.Equals(expected.DenyCommand, actual.DenyCommand, StringComparison.OrdinalIgnoreCase) ||
            expected.MinimumBet != actual.MinimumBet ||
            expected.MaximumBet != actual.MaximumBet ||
            expected.RequestTimeoutSeconds != actual.RequestTimeoutSeconds ||
            expected.UserCooldownSeconds != actual.UserCooldownSeconds ||
            expected.GlobalCooldownSeconds != actual.GlobalCooldownSeconds ||
            expected.AllowAllIn != actual.AllowAllIn ||
            expected.AllowEveryone != actual.AllowEveryone ||
            expected.AllowFollowers != actual.AllowFollowers ||
            expected.AllowSubscribers != actual.AllowSubscribers ||
            expected.AllowVips != actual.AllowVips ||
            expected.AllowModerators != actual.AllowModerators ||
            expected.FairMode != actual.FairMode ||
            expected.ChallengerWinChancePercent != actual.ChallengerWinChancePercent ||
            expected.SendRequestMessage != actual.SendRequestMessage ||
            expected.SendResultMessage != actual.SendResultMessage ||
            expected.SendDenyMessage != actual.SendDenyMessage ||
            expected.SendTimeoutMessage != actual.SendTimeoutMessage ||
            expected.TimeoutLoserEnabled != actual.TimeoutLoserEnabled ||
            expected.LoserTimeoutSeconds != actual.LoserTimeoutSeconds ||
            !string.Equals(expected.LoserTimeoutReason, actual.LoserTimeoutReason, StringComparison.Ordinal) ||
            !string.Equals(expected.DuelRequestMessage, actual.DuelRequestMessage, StringComparison.Ordinal) ||
            !string.Equals(expected.DuelAcceptedMessage, actual.DuelAcceptedMessage, StringComparison.Ordinal) ||
            !string.Equals(expected.DuelWinMessage, actual.DuelWinMessage, StringComparison.Ordinal) ||
            !string.Equals(expected.DuelDeniedMessage, actual.DuelDeniedMessage, StringComparison.Ordinal) ||
            !string.Equals(expected.DuelTimeoutMessage, actual.DuelTimeoutMessage, StringComparison.Ordinal) ||
            !string.Equals(expected.NotEnoughPointsChallengerMessage, actual.NotEnoughPointsChallengerMessage, StringComparison.Ordinal) ||
            !string.Equals(expected.NotEnoughPointsTargetMessage, actual.NotEnoughPointsTargetMessage, StringComparison.Ordinal) ||
            !string.Equals(expected.SelfDuelMessage, actual.SelfDuelMessage, StringComparison.Ordinal) ||
            !string.Equals(expected.NoPendingDuelMessage, actual.NoPendingDuelMessage, StringComparison.Ordinal) ||
            !string.Equals(expected.WrongTargetMessage, actual.WrongTargetMessage, StringComparison.Ordinal) ||
            !string.Equals(expected.AlreadyPendingDuelMessage, actual.AlreadyPendingDuelMessage, StringComparison.Ordinal) ||
            !string.Equals(expected.InvalidBetMessage, actual.InvalidBetMessage, StringComparison.Ordinal))
        {
            throw new InvalidOperationException("Duel-Einstellungen wurden geschrieben, aber beim Nachladen nicht bestätigt.");
        }
    }


    private async void SaveDuelSettingsFromControls()
    {
        AppendSaveDebug("Duel-Speichern geklickt.");
        if (_settingsSaveBusy)
        {
            AppendLog("Speichern läuft bereits. Bitte kurz warten …");
            return;
        }

        _settingsSaveBusy = true;
        SetSettingsControlsEnabled(false);

        try
        {
            AppendSaveDebug("Duel-Speichern startet.");
            var config = _configurationService.LoadForEditing();
            ReadDuelSettings(config);
            _configurationService.SaveGuiSettings(config);
            var verified = _configurationService.LoadForEditing();
            VerifyDuelSettingsPersisted(config.Duel, verified.Duel);
            AppendSaveDebug("Duel-Nachladeprüfung erfolgreich: Aktiv=" + verified.Duel.Enabled + ", Command=" + verified.Duel.DuelCommand + ", Accept=" + verified.Duel.AcceptCommand + ", Deny=" + verified.Duel.DenyCommand + ", WinTextLen=" + (verified.Duel.DuelWinMessage?.Length ?? 0));
            ApplyRuntimeSettings(verified);
            AppendSaveDebug("Duel-Einstellungen wurden gespeichert: Aktiv=" + verified.Duel.Enabled + ", Command=" + verified.Duel.DuelCommand + ", Accept=" + verified.Duel.AcceptCommand + ", Deny=" + verified.Duel.DenyCommand + ", CommandDuel=" + verified.Commands.IsCommandEnabled("duel.challenge"));
            SetMinigameStatus("Duel-Einstellungen gespeichert", ActiveColor);
            SetOverallStatus("Einstellungen gespeichert", ActiveColor);
            _commandRegistry.Update(verified);
            RefreshCommandGrid();
        }
        catch (Exception exception)
        {
            AppendSaveDebug("Duel-Einstellungen konnten nicht gespeichert werden: " + exception.Message);
            SetOverallStatus("Einstellungsfehler", ErrorColor);
            SetMinigameStatus("Duel-Fehler: " + exception.Message, ErrorColor);
            ShowSection("minigame");
        }
        finally
        {
            SetSettingsControlsEnabled(true);
            _settingsSaveBusy = false;
        }
    }


'''
              require(marker in text, 'Duel status marker missing')
              text = text.replace(marker, method + marker)
          require('SaveDuelSettingsFromControls' in text, 'Duel save method missing')
          write(duel_path, text)

          heist_path = 'RaidClipPlugin/MainForm.HeistCommands.cs'
          text = read(heist_path)
          text = text.replace('_heistSaveButton.Click += (_, _) => SaveSettingsFromControls();', '_heistSaveButton.Click += (_, _) => SaveHeistSettingsFromControls();')
          text = text.replace('_heistSaveButton.Click += (_, _) => SaveMinigameSettingsFromControls();', '_heistSaveButton.Click += (_, _) => SaveHeistSettingsFromControls();')
          text = text.replace('private void ReadHeistCommandsSettings(AppConfig config)\n    {', 'private void ReadHeistCommandsSettings(AppConfig config, bool includeCustomCommands = true)\n    {')
          text = text.replace('        var h=config.Heist; h.Enabled=_heistEnabledCheck.Checked; h.StartCommand=_heistStartCommandBox.Text;\n        h.JoinCommand=_heistJoinCommandBox.Text; h.MinimumParticipants=(int)_heistMinimumControl.Value;', '        var defaults = new HeistConfig();\n        var h=config.Heist; h.Enabled=_heistEnabledCheck.Checked; h.StartCommand=ReadHeistCommand(_heistStartCommandBox, defaults.StartCommand);\n        h.JoinCommand=ReadHeistCommand(_heistJoinCommandBox, defaults.JoinCommand); h.MinimumParticipants=(int)_heistMinimumControl.Value;')
          text = text.replace('        ReadCustomCommandSettings(config.Commands);\n        SyncMinigameCommandOverrides(config);', '        if (includeCustomCommands)\n            ReadCustomCommandSettings(config.Commands);\n        SyncMinigameCommandOverrides(config);')
          text = text.replace('        ReadCustomCommandSettings(config.Commands);\n    }', '        if (includeCustomCommands)\n            ReadCustomCommandSettings(config.Commands);\n        SyncMinigameCommandOverrides(config);\n        AppendSaveDebug("Heist-Werte aus GUI gelesen: Aktiv=" + h.Enabled + ", Start=" + h.StartCommand + ", Join=" + h.JoinCommand + ", Min=" + h.MinimumParticipants + ", Max=" + h.MaximumParticipants + ", CommandHeist=" + config.Commands.IsCommandEnabled("heist.start"));\n    }')
          if 'private static void VerifyHeistSettingsPersisted' not in text:
              marker = '    private void OnHeistStatusChanged(HeistStatus status)\n'
              helper = '''    private static void VerifyHeistSettingsPersisted(HeistConfig expected, HeistConfig actual)
    {
        if (expected.Enabled != actual.Enabled ||
            !string.Equals(expected.StartCommand, actual.StartCommand, StringComparison.OrdinalIgnoreCase) ||
            !string.Equals(expected.JoinCommand, actual.JoinCommand, StringComparison.OrdinalIgnoreCase) ||
            expected.MinimumParticipants != actual.MinimumParticipants ||
            expected.MaximumParticipants != actual.MaximumParticipants ||
            expected.JoinDurationSeconds != actual.JoinDurationSeconds ||
            expected.SuccessChancePercent != actual.SuccessChancePercent ||
            expected.GlobalCooldownMinutes != actual.GlobalCooldownMinutes ||
            expected.UserCooldownMinutes != actual.UserCooldownMinutes ||
            expected.ApplyGlobalCooldownOnCancelledHeist != actual.ApplyGlobalCooldownOnCancelledHeist ||
            expected.AllowEveryone != actual.AllowEveryone ||
            expected.AllowFollowers != actual.AllowFollowers ||
            expected.AllowSubscribers != actual.AllowSubscribers ||
            expected.AllowVips != actual.AllowVips ||
            expected.AllowModerators != actual.AllowModerators ||
            expected.SendParticipantJoinMessages != actual.SendParticipantJoinMessages ||
            expected.SendCountdownMessages != actual.SendCountdownMessages ||
            expected.SendResultMessages != actual.SendResultMessages ||
            expected.ResetJackpotAfterSuccess != actual.ResetJackpotAfterSuccess ||
            !string.Equals(expected.StartMessage, actual.StartMessage, StringComparison.Ordinal) ||
            !string.Equals(expected.JoinMessage, actual.JoinMessage, StringComparison.Ordinal) ||
            !string.Equals(expected.AlreadyJoinedMessage, actual.AlreadyJoinedMessage, StringComparison.Ordinal) ||
            !string.Equals(expected.NoActiveHeistMessage, actual.NoActiveHeistMessage, StringComparison.Ordinal) ||
            !string.Equals(expected.MaximumParticipantsMessage, actual.MaximumParticipantsMessage, StringComparison.Ordinal) ||
            !string.Equals(expected.NotEnoughParticipantsMessage, actual.NotEnoughParticipantsMessage, StringComparison.Ordinal) ||
            !string.Equals(expected.EvaluationMessage, actual.EvaluationMessage, StringComparison.Ordinal) ||
            !string.Equals(expected.SuccessMessage, actual.SuccessMessage, StringComparison.Ordinal) ||
            !string.Equals(expected.FailureMessage, actual.FailureMessage, StringComparison.Ordinal))
        {
            throw new InvalidOperationException("Heist-Einstellungen wurden geschrieben, aber beim Nachladen nicht bestätigt.");
        }
    }


    private async void SaveHeistSettingsFromControls()
    {
        AppendSaveDebug("Heist-Speichern geklickt.");
        if (_settingsSaveBusy)
        {
            AppendLog("Speichern läuft bereits. Bitte kurz warten …");
            return;
        }

        _settingsSaveBusy = true;
        SetSettingsControlsEnabled(false);

        try
        {
            AppendSaveDebug("Heist-Speichern startet.");
            var config = _configurationService.LoadForEditing();
            ReadHeistCommandsSettings(config, includeCustomCommands: false);
            _configurationService.SaveGuiSettings(config);
            var verified = _configurationService.LoadForEditing();
            VerifyHeistSettingsPersisted(config.Heist, verified.Heist);
            AppendSaveDebug("Heist-Nachladeprüfung erfolgreich: Aktiv=" + verified.Heist.Enabled + ", Start=" + verified.Heist.StartCommand + ", Join=" + verified.Heist.JoinCommand + ", SuccessTextLen=" + (verified.Heist.SuccessMessage?.Length ?? 0));
            ApplyRuntimeSettings(verified);
            AppendSaveDebug("Heist-Einstellungen wurden gespeichert: Aktiv=" + verified.Heist.Enabled + ", Start=" + verified.Heist.StartCommand + ", Join=" + verified.Heist.JoinCommand + ", CommandHeist=" + verified.Commands.IsCommandEnabled("heist.start"));
            SetMinigameStatus("Heist-Einstellungen gespeichert", ActiveColor);
            SetOverallStatus("Einstellungen gespeichert", ActiveColor);
            _commandRegistry.Update(verified);
            RefreshCommandGrid();
        }
        catch (Exception exception)
        {
            AppendSaveDebug("Heist-Einstellungen konnten nicht gespeichert werden: " + exception.Message);
            SetOverallStatus("Einstellungsfehler", ErrorColor);
            SetMinigameStatus("Heist-Fehler: " + exception.Message, ErrorColor);
            ShowSection("minigame");
        }
        finally
        {
            SetSettingsControlsEnabled(true);
            _settingsSaveBusy = false;
        }
    }


'''
              require(marker in text, 'Heist status marker missing')
              text = text.replace(marker, helper + marker)
          old = '''            _configurationService.SaveGuiSettings(config);
            ApplyRuntimeSettings(config);
            AppendSaveDebug(
                "Heist-Einstellungen wurden gespeichert: Aktiv=" + config.Heist.Enabled +
                ", Start=" + config.Heist.StartCommand +
                ", Join=" + config.Heist.JoinCommand +
                ", CommandHeist=" + config.Commands.IsCommandEnabled("heist.start"));
            SetMinigameStatus("Heist-Einstellungen gespeichert", ActiveColor);
            SetOverallStatus("Einstellungen gespeichert", ActiveColor);
            _commandRegistry.Update(config);
            RefreshCommandGrid();'''
          new = '''            _configurationService.SaveGuiSettings(config);
            var verified = _configurationService.LoadForEditing();
            VerifyHeistSettingsPersisted(config.Heist, verified.Heist);
            AppendSaveDebug(
                "Heist-Nachladeprüfung erfolgreich: Aktiv=" + verified.Heist.Enabled +
                ", Start=" + verified.Heist.StartCommand +
                ", Join=" + verified.Heist.JoinCommand +
                ", SuccessTextLen=" + (verified.Heist.SuccessMessage?.Length ?? 0));
            ApplyRuntimeSettings(verified);
            AppendSaveDebug(
                "Heist-Einstellungen wurden gespeichert: Aktiv=" + verified.Heist.Enabled +
                ", Start=" + verified.Heist.StartCommand +
                ", Join=" + verified.Heist.JoinCommand +
                ", CommandHeist=" + verified.Commands.IsCommandEnabled("heist.start"));
            SetMinigameStatus("Heist-Einstellungen gespeichert", ActiveColor);
            SetOverallStatus("Einstellungen gespeichert", ActiveColor);
            _commandRegistry.Update(verified);
            RefreshCommandGrid();'''
          if old in text:
              text = text.replace(old, new)
          require('SaveHeistSettingsFromControls' in text, 'Heist save method missing')
          require('ReadHeistCommandsSettings(config, includeCustomCommands: false)' in text, 'Heist scoped read missing')
          write(heist_path, text)

          print('Persistence patch applied for', VERSION)
          '@ | Set-Content -Path patch-persistence-1945.py -Encoding UTF8
          python patch-persistence-1945.py

      - name: Build
        shell: pwsh
        run: dotnet build RaidClipPlugin/RaidClipPlugin.csproj -c Release

      - name: Commit source changes
        shell: pwsh
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add RaidClipPlugin/MainForm.HeistCommands.cs RaidClipPlugin/MainForm.Duel.cs RaidClipPlugin/RaidClipPlugin.csproj
          if (git diff --cached --quiet) {
            echo "No source changes to commit."
          } else {
            git commit -m "Fix Heist and Duel settings persistence for 1.9.45"
            git push
          }

      - name: Publish app
        shell: pwsh
        run: |
          dotnet publish RaidClipPlugin/RaidClipPlugin.csproj -c Release -r win-x64 --self-contained true -p:PublishSingleFile=true -p:IncludeNativeLibrariesForSelfExtract=true -o RaidClipPlugin/publish
          Compress-Archive -Path RaidClipPlugin/publish/* -DestinationPath "RaidClipPlugin-$env:VERSION-win-x64.zip" -Force

      - name: Build installer
        shell: pwsh
        run: |
          choco install innosetup -y --no-progress
          $programFilesX86 = [Environment]::GetFolderPath('ProgramFilesX86')
          $iscc = Join-Path (Join-Path $programFilesX86 'Inno Setup 6') 'ISCC.exe'
          if (Test-Path 'RaidClipPlugin/Installer/RaidClipPlugin.iss') {
            & $iscc "/DMyAppVersion=$env:VERSION" "RaidClipPlugin/Installer/RaidClipPlugin.iss"
            Copy-Item "RaidClipPlugin/installer-output/RaidClipPlugin-Setup-$env:VERSION.exe" "RaidClipPluginSetup-$env:VERSION.exe" -Force
          }

      - name: Create update manifest
        shell: pwsh
        run: |
          $zip = "RaidClipPlugin-$env:VERSION-win-x64.zip"
          $sha = (Get-FileHash $zip -Algorithm SHA256).Hash.ToLowerInvariant()
          $manifest = [ordered]@{
            latestVersion = $env:VERSION
            downloadUrl = "https://github.com/Funjii95/RaidClipPlugin/releases/download/v$env:VERSION/$zip"
            changelog = "Hotfix 1.9.45: Heist und Duel speichern über eigene Pfade und prüfen nach dem Schreiben, ob Texte und Werte korrekt aus settings.json geladen werden."
            sha256 = $sha
          }
          $manifest | ConvertTo-Json -Depth 4 | Set-Content -Path update.json -Encoding UTF8

      - name: Create release
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          $tag = "v$env:VERSION"
          $notes = @(
            "Hotfix $env:VERSION",
            "",
            "- Duel speichert jetzt über einen eigenen Speicherpfad.",
            "- Heist und Duel verifizieren nach dem Speichern Haken, Commands, Werte und Chattexte durch echtes Nachladen aus settings.json.",
            "- Wenn Persistenz fehlschlägt, landet eine klare Meldung im save-debug.log.",
            "",
            "Test: Heist/Duel Text ändern, speichern, App schließen, neu öffnen. Text und Haken müssen erhalten bleiben."
          ) -join [Environment]::NewLine
          git tag -f $tag
          git push origin $tag --force
          gh release delete $tag -y --cleanup-tag 2>$null || $true
          $assets = @("RaidClipPlugin-$env:VERSION-win-x64.zip", "update.json")
          if (Test-Path "RaidClipPluginSetup-$env:VERSION.exe") { $assets += "RaidClipPluginSetup-$env:VERSION.exe" }
          gh release create $tag @assets --title "RaidClipPlugin $env:VERSION" --notes $notes
