          python patch-minigame-early-load.py

      - name: Verify patch markers
        shell: pwsh
        run: |
          $main = Get-Content RaidClipPlugin/MainForm.cs -Raw
          $start = $main.IndexOf('private void ApplySavedCriticalSettingsToControls')
          $end = $main.IndexOf('private AppConfig ReadGeneralSettingsFromControls', $start)
          $critical = $main.Substring($start, $end - $start)
          if (-not $critical.Contains('_currencySingularBox.Text = config.Minigame.CurrencySingular;')) { throw 'Currency is not loaded in critical block.' }
          if (-not $critical.Contains('SetNumericValue(_pointsPerIntervalControl')) { throw 'Point values are not loaded in critical block.' }
          if (-not $critical.Contains('_gambleTextBoxes[index].Text = range.ChatText;')) { throw 'Gamble texts are not loaded in critical block.' }

      - name: Build
        shell: pwsh
        run: dotnet build RaidClipPlugin/RaidClipPlugin.csproj -c Release

      - name: Commit source changes
        shell: pwsh
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add RaidClipPlugin/MainForm.cs RaidClipPlugin/Services/ConfigurationService.cs RaidClipPlugin/RaidClipPlugin.csproj
          if (git diff --cached --quiet) {
            echo "No source changes to commit."
          } else {
            git commit -m "Fix minigame values early loading for 1.9.41"
            git push
          }

      - name: Publish app
        shell: pwsh
        run: |
          dotnet publish RaidClipPlugin/RaidClipPlugin.csproj -c Release -r win-x64 --self-contained true -p:PublishSingleFile=true -p:IncludeNativeLibrariesForSelfExtract=true -o RaidClipPlugin/publish
          Compress-Archive -Path RaidClipPlugin/publish/* -DestinationPath "RaidClipPlugin-$env:VERSION-win-x64.zip" -Force

      - name: Build installer
        shell: pwsh
        run: |
          choco install innosetup -y --no-progress
          $programFilesX86 = [Environment]::GetFolderPath('ProgramFilesX86')
          $iscc = Join-Path (Join-Path $programFilesX86 'Inno Setup 6') 'ISCC.exe'
          if (Test-Path 'RaidClipPlugin/Installer/RaidClipPlugin.iss') {
            & $iscc "/DMyAppVersion=$env:VERSION" "RaidClipPlugin/Installer/RaidClipPlugin.iss"
            Copy-Item "RaidClipPlugin/installer-output/RaidClipPlugin-Setup-$env:VERSION.exe" "RaidClipPluginSetup-$env:VERSION.exe" -Force
          }

      - name: Create update manifest
        shell: pwsh
        run: |
          $zip = "RaidClipPlugin-$env:VERSION-win-x64.zip"
          $sha = (Get-FileHash $zip -Algorithm SHA256).Hash.ToLowerInvariant()
          $manifest = [ordered]@{
            latestVersion = $env:VERSION
            downloadUrl = "https://github.com/Funjii95/RaidClipPlugin/releases/download/v$env:VERSION/$zip"
            changelog = "Hotfix 1.9.41: Punkte-Namen und alle Minigame-Einzelwerte werden jetzt wirklich im frühen Ladeblock der GUI gesetzt. Enthält eine Workflow-Prüfung gegen genau diesen Fehler."
            sha256 = $sha
          }
          $manifest | ConvertTo-Json -Depth 4 | Set-Content -Path update.json -Encoding UTF8

      - name: Create release
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          $tag = "v$env:VERSION"
          $notes = @(
            "Hotfix 1.9.41",
            "",
            "- Punkte-Namen, Punktewerte, Einsätze, Cooldowns, Blacklist, Command-Optionen und Gamble-Texte werden im frühen Ladeblock gesetzt.",
            "- Der Workflow prüft jetzt explizit, dass diese Werte wirklich in ApplySavedCriticalSettingsToControls vorhanden sind.",
            "- Behebt 1.9.40, wo die Diagnose drin war, der vollständige Früh-Ladeblock aber wegen einer zu groben Duplikatprüfung nicht eingefügt wurde.",
            "",
            "Test: Punkte-Namen ändern, Werte ändern, Minigame speichern, App komplett schließen, neu öffnen. Werte müssen sichtbar erhalten bleiben."
          ) -join [Environment]::NewLine
          git tag -f $tag
          git push origin $tag --force
          gh release delete $tag -y --cleanup-tag 2>$null || $true
          $assets = @("RaidClipPlugin-$env:VERSION-win-x64.zip", "update.json")
          if (Test-Path "RaidClipPluginSetup-$env:VERSION.exe") { $assets += "RaidClipPluginSetup-$env:VERSION.exe" }
          gh release create $tag @assets --title "RaidClipPlugin $env:VERSION" --notes $notes
