name: Apply points 64-bit and cooldown replies
on:
  workflow_dispatch:
permissions:
  contents: write
jobs:
  apply:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Apply files
        shell: pwsh
        run: |
          $files = @{
            'RaidClipPlugin/Config/AppConfig.cs' = ''
            'RaidClipPlugin/Config/DuelConfig.cs' = ''
            'RaidClipPlugin/Models/ViewerPointEntry.cs' = ''
            'RaidClipPlugin/Models/GiveawayModels.cs' = ''
            'RaidClipPlugin/Services/ViewerPointStore.cs' = ''
            'RaidClipPlugin/Services/ChatMinigameService.cs' = ''
            'RaidClipPlugin/Services/DuelService.cs' = ''
            'RaidClipPlugin/Services/HeistService.cs' = ''
            'RaidClipPlugin/Services/GiveawayService.cs' = ''
            'RaidClipPlugin/Services/ConfigurationService.cs' = ''
            'RaidClipPlugin/MainForm.cs' = ''
            'RaidClipPlugin/MainForm.Duel.cs' = ''
            'RaidClipPlugin/MainForm.HeistCommands.cs' = ''
          }
          foreach ($entry in $files.GetEnumerator()) {
            $target = Join-Path $PWD $entry.Key
            New-Item -ItemType Directory -Force -Path (Split-Path $target) | Out-Null
            [IO.File]::WriteAllBytes($target, [Convert]::FromBase64String($entry.Value))
          }
      - name: Build
        shell: pwsh
        run: dotnet build RaidClipPlugin/RaidClipPlugin.csproj -c Release
      - name: Commit changes
        shell: pwsh
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git status --short
          git add RaidClipPlugin
          git commit -m "Use 64-bit points and show minigame cooldowns"
          git push

