name: Release 1.4.11 Chatbot-Diagnose

on:
  push:
    paths:
      - ".github/workflows/release-1.4.11-chat-diagnostics.yml"

permissions:
  contents: write

jobs:
  apply-test-publish:
    runs-on: windows-latest
    steps:
      - name: Repository laden
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Änderungen anwenden
        shell: pwsh
        run: |
          $compressed = [Convert]::FromBase64String("")
          $inputStream = [IO.MemoryStream]::new($compressed)
          $gzip = [IO.Compression.GZipStream]::new($inputStream, [IO.Compression.CompressionMode]::Decompress)
          $reader = [IO.StreamReader]::new($gzip, [Text.UTF8Encoding]::new($false))
          $files = ($reader.ReadToEnd() | ConvertFrom-Json)
          $reader.Dispose()
          $gzip.Dispose()
          $inputStream.Dispose()
          foreach ($property in $files.PSObject.Properties) {
            $target = Join-Path $PWD $property.Name
            $directory = Split-Path $target -Parent
            New-Item -ItemType Directory -Force $directory | Out-Null
            [IO.File]::WriteAllText($target, [string]$property.Value, [Text.UTF8Encoding]::new($false))
          }

      - name: .NET 10 einrichten
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"

      - name: Unit-Tests ausführen
        working-directory: RaidClipPlugin
        shell: pwsh
        run: dotnet test "Tests\RaidClipPlugin.Tests.csproj" -c Release

      - name: Quellcode übernehmen
        shell: pwsh
        run: |
          Remove-Item ".github/workflows/release-1.4.11-chat-diagnostics.yml"
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add RaidClipPlugin .github/workflows/release-1.4.11-chat-diagnostics.yml
          git commit -m "Chatbot-Diagnose und Songrequest für Version 1.4.11"
          git push origin main

      - name: Release 1.4.11 starten
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release create v1.4.11 --target main --latest --title "RaidClipPlugin 1.4.11" --notes "Chatbot-Diagnose mit Token-, Scope-, WebSocket- und Subscription-Status. Enthält Twitch-Neuanmeldung, Chat-Neustart, Testnachricht sowie !songrequest und !sr."
