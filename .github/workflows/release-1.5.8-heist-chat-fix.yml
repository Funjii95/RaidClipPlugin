name: Release 1.5.8 Heist Chat Fix

on:
  push:
    branches: [main]
    paths:
      - .github/workflows/release-1.5.8-heist-chat-fix.yml

permissions:
  contents: write
  actions: write

jobs:
  test-release:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'
      - name: Apply version 1.5.8 heist chat fix
        shell: pwsh
        env:
          PAYLOAD: 
        run: |
          @'
          import os, base64, gzip, json, pathlib
          files = json.loads(gzip.decompress(base64.b64decode(os.environ["PAYLOAD"])).decode("utf-8"))
          for name, content in files.items():
              path = pathlib.Path(name)
              path.parent.mkdir(parents=True, exist_ok=True)
              path.write_text(content, encoding="utf-8", newline="")
          twitch_path = pathlib.Path("RaidClipPlugin/Services/TwitchService.cs")
          twitch = twitch_path.read_text(encoding="utf-8")
          old = "public sealed class TwitchService : ITwitchClipClient, IClipChatClient, IGiveawayTwitchClient"
          new = old + ", IHeistTwitchClient"
          if new not in twitch:
              if old not in twitch:
                  raise RuntimeError("TwitchService declaration could not be patched")
              twitch = twitch.replace(old, new, 1)
              twitch_path.write_text(twitch, encoding="utf-8", newline="")
          print(f"Applied {len(files)} files and preserved the current TwitchService")
          '@ | python -
      - name: Restore
        run: dotnet restore "RaidClipPlugin/Tests/RaidClipPlugin.Tests.csproj"
      - name: Build
        run: dotnet build "RaidClipPlugin/RaidClipPlugin.csproj" -c Release --no-restore
      - name: Test heist chat and complete suite
        run: dotnet test "RaidClipPlugin/Tests/RaidClipPlugin.Tests.csproj" -c Release --no-restore --logger "console;verbosity=normal"
      - name: Commit version 1.5.8
        shell: pwsh
        run: |
          Remove-Item -LiteralPath ".github/workflows/release-1.5.8-heist-chat-fix.yml" -Force
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Version 1.5.8: Heist-Chatreaktion reparieren"
          git push origin main
          git tag -a v1.5.8 -m "RaidClipPlugin 1.5.8"
          git push origin v1.5.8
      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        shell: pwsh
        run: |
          gh release create v1.5.8 --title "RaidClipPlugin 1.5.8" --notes "Behebt die fehlende Reaktion auf !heist. Broadcaster mit identischem Botkonto werden nicht mehr blockiert und können auch per !join einem von Moderatoren gestarteten Heist beitreten. Moderatoren können Heists starten; deaktivierte beziehungsweise nicht erlaubte Aufrufe erhalten eine Chatantwort. Der Test-Heist sendet drei klar markierte Testmeldungen, ohne Punkte oder Jackpot zu verändern."
      - name: Build installer and update package
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh workflow run release.yml --ref v1.5.8
