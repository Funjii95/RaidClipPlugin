name: Release 1.7.0 TIDAL Architecture

on:
  push:
    branches: [main]
    paths:
      - .github/workflows/release-1.7.0-tidal-analysis.yml

permissions:
  contents: write
  actions: write

jobs:
  test-release:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'
      - name: Apply version 1.7.0 sources
        shell: pwsh
        env:
          PAYLOAD: 
        run: |
          @'
          import os, base64, gzip, json, pathlib
          files = json.loads(gzip.decompress(base64.b64decode(os.environ["PAYLOAD"])).decode("utf-8"))
          for name, content in files.items():
              path = pathlib.Path(name)
              path.parent.mkdir(parents=True, exist_ok=True)
              path.write_text(content, encoding="utf-8", newline="")
          print(f"Applied {len(files)} files")
          '@ | python -
      - name: Restore
        run: dotnet restore "RaidClipPlugin/Tests/RaidClipPlugin.Tests.csproj"
      - name: Build application
        run: dotnet build "RaidClipPlugin/RaidClipPlugin.csproj" -c Release --no-restore
      - name: Run all tests
        run: dotnet test "RaidClipPlugin/Tests/RaidClipPlugin.Tests.csproj" -c Release --no-restore --logger "console;verbosity=normal"
      - name: Commit version 1.7.0
        shell: pwsh
        run: |
          Remove-Item -LiteralPath ".github/workflows/release-1.7.0-tidal-analysis.yml" -Force
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Version 1.7.0: TIDAL-Analyse und Musikprovider-Architektur"
          git push origin main
          git tag -a v1.7.0 -m "RaidClipPlugin 1.7.0"
          git push origin v1.7.0
      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        shell: pwsh
        run: |
          gh release create v1.7.0 --title "RaidClipPlugin 1.7.0" --notes "TIDAL-Integrationsanalyse und sichere Musikprovider-Grundlage. Neu sind IMusicProvider, gemeinsame Such-/Auth-Modelle, ein zentraler Capability-Katalog und automatisierte Sicherheitstests. Ergebnis: TIDAL ist offiziell für Suche, Metadaten, Links, Embeds und eine interne Queue geeignet; Desktop-Queue, Geräte-/Connect-Steuerung und vergleichbares automatisches Playback werden mangels offizieller .NET-/Remote-API bewusst nicht vorgetäuscht. Der bestehende Spotify- und Songrequest-Ablauf bleibt unverändert. Die vollständige Funktionsmatrix und der Phasenplan liegen unter docs/TIDAL-INTEGRATION-ANALYSIS.md."
      - name: Build installer and update package
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh workflow run release.yml --ref v1.7.0
