name: Apply modern shell dashboard

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  patch:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Apply modern shell dashboard
        shell: pwsh
        run: |
          $patchB64 = @'

'@
          $patchText = [Text.Encoding]::UTF8.GetString([Convert]::FromBase64String($patchB64))
          Set-Content -Path apply-modern-shell-dashboard.py -Value $patchText -Encoding UTF8
          python apply-modern-shell-dashboard.py

      - name: Build
        shell: pwsh
        run: dotnet build RaidClipPlugin/RaidClipPlugin.csproj -c Release

      - name: Tests
        shell: pwsh
        run: dotnet test RaidClipPlugin/Tests/RaidClipPlugin.Tests.csproj -c Release

      - name: Commit changes
        shell: pwsh
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add RaidClipPlugin/MainForm.cs RaidClipPlugin/MainForm.Themes.cs RaidClipPlugin/MainForm.ModernShell.cs RaidClipPlugin/MainForm.ClipsDiscord.cs RaidClipPlugin/MainForm.AutoDiscordClipPoster.cs RaidClipPlugin/MainForm.HeistCommands.cs
          if (git diff --cached --quiet) {
            Write-Host "No changes to commit."
            exit 0
          }
          git commit -m "Modernize RaidClip GUI shell and dashboard"
          git push
