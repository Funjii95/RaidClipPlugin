      - name: Build
        shell: pwsh
        run: dotnet build RaidClipPlugin/RaidClipPlugin.csproj -c Release

      - name: Tests
        shell: pwsh
        run: dotnet test RaidClipPlugin/Tests/RaidClipPlugin.Tests.csproj -c Release

      - name: Commit changes
        shell: pwsh
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add RaidClipPlugin/MainForm.cs RaidClipPlugin/MainForm.Themes.cs RaidClipPlugin/MainForm.ModernShell.cs RaidClipPlugin/MainForm.ClipsDiscord.cs RaidClipPlugin/MainForm.AutoDiscordClipPoster.cs RaidClipPlugin/MainForm.HeistCommands.cs
          if (git diff --cached --quiet) {
            Write-Host "No changes to commit."
            exit 0
          }
          git commit -m "Modernize RaidClip GUI shell and dashboard"
          git push
