          $mainText = $mainText.Replace('Height = 205,', 'Height = 150,')
          Set-Content -Path $mainPath -Value $mainText -Encoding UTF8

      - name: Build
        shell: pwsh
        run: dotnet build RaidClipPlugin/RaidClipPlugin.csproj -c Release

      - name: Commit changes
        shell: pwsh
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add RaidClipPlugin/MainForm.cs RaidClipPlugin/MainForm.Themes.cs RaidClipPlugin/Services/ConfigurationService.cs
          if (git diff --cached --quiet) {
            Write-Host "No changes to commit."
            exit 0
          }
          git commit -m "Modernize GUI themes and add red variant"
          git push

