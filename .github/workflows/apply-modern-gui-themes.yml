          $configText = Get-Content -Raw -Path $configPath -Encoding UTF8
          $configText = $configText.Replace('if (config.UiTheme is not ("RaidRed" or "NeonGreen" or "TwitchPurple"))', 'if (config.UiTheme is not ("RaidRed" or "DarkPurple" or "DarkBlue" or "LightModern" or "NeonGreen" or "TwitchPurple"))')
