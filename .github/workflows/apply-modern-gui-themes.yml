          $mainText = Get-Content -Raw -Path $mainPath -Encoding UTF8
          $mainText = $mainText.Replace('Width = 242,', 'Width = 228,')
          $mainText = $mainText.Replace('Height = 88,', 'Height = 54,')
          $mainText = $mainText.Replace('Font = new Font("Segoe UI", 10F, FontStyle.Bold),', 'Font = new Font("Segoe UI", 9.2F, FontStyle.Bold),')
          $mainText = $mainText.Replace('Padding = new Padding(18, 8, 12, 8),', 'Padding = new Padding(15, 6, 12, 6),')
          $mainText = $mainText.Replace('Margin = new Padding(5, 5, 5, 2),', 'Margin = new Padding(5, 4, 5, 2),')
          $mainText = $mainText.Replace('button.FlatAppearance.MouseDownBackColor = Color.FromArgb(125, 12, 17);', 'button.FlatAppearance.MouseDownBackColor = ControlPaint.Dark(AccentDarkColor);')
