name: Publish 1.9.15 Installer Safety Retry

on:
  workflow_dispatch:
  push:
    paths:
      - '.github/workflows/publish-1.9.15-installer-safety-retry.yml'

permissions:
  contents: write

env:
  VERSION: 1.9.15

jobs:
  publish:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Apply installer safety and log stability hotfix
        shell: pwsh
        run: |
          $script = [System.Text.Encoding]::UTF8.GetString([System.Convert]::FromBase64String(''))
          Set-Content -Path patch-1.9.15-hotfix.py -Value $script -Encoding UTF8
          python patch-1.9.15-hotfix.py

      - name: Commit hotfix source
        shell: pwsh
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add RaidClipPlugin/Services/UpdateService.cs RaidClipPlugin/MainForm.cs RaidClipPlugin/RaidClipPlugin.csproj
          if (git diff --cached --quiet) {
            Write-Host "No source changes to commit."
          } else {
            git commit -m "Fix installer update payload handling and log disposal"
            git push
          }

      - name: Restore
        run: dotnet restore RaidClipPlugin/RaidClipPlugin.csproj

      - name: Restore tests
        run: dotnet restore RaidClipPlugin/Tests/RaidClipPlugin.Tests.csproj

      - name: Build
        run: dotnet build RaidClipPlugin/RaidClipPlugin.csproj -c Release --no-restore

      - name: Test
        run: dotnet test RaidClipPlugin/Tests/RaidClipPlugin.Tests.csproj -c Release --no-restore --verbosity normal

      - name: Publish app
        shell: pwsh
        run: |
          dotnet publish RaidClipPlugin/RaidClipPlugin.csproj -c Release -r win-x64 --self-contained true -p:PublishSingleFile=true -p:EnableCompressionInSingleFile=true -o RaidClipPlugin/publish
          Compress-Archive -Path RaidClipPlugin/publish/* -DestinationPath "RaidClipPlugin-$env:VERSION-win-x64.zip" -Force

      - name: Build installer
        shell: pwsh
        run: |
          choco install innosetup -y --no-progress
          $iscc = "${env:ProgramFiles(x86)}\Inno Setup 6\ISCC.exe"
          if (-not (Test-Path $iscc)) { throw "ISCC.exe wurde nicht gefunden." }
          & $iscc "/DMyAppVersion=$env:VERSION" "RaidClipPlugin\Installer\RaidClipPlugin.iss"
          $installer = Get-ChildItem -Path RaidClipPlugin/installer-output -Filter *.exe | Sort-Object LastWriteTime -Descending | Select-Object -First 1
          if (-not $installer) { throw "Installer wurde nicht erzeugt." }
          Copy-Item $installer.FullName "RaidClipPluginSetup-$env:VERSION.exe" -Force

      - name: Verify ZIP update payload
        shell: pwsh
        run: |
          $asset = "RaidClipPlugin-$env:VERSION-win-x64.zip"
          if (-not (Test-Path $asset)) { throw "ZIP wurde nicht erzeugt." }
          $extract = Join-Path $env:RUNNER_TEMP "verify-update-payload"
          if (Test-Path $extract) { Remove-Item $extract -Recurse -Force }
          New-Item -ItemType Directory -Path $extract | Out-Null
          Expand-Archive -Path $asset -DestinationPath $extract -Force
          if (-not (Test-Path (Join-Path $extract 'RaidClipPlugin.exe'))) { throw "ZIP enthält keine RaidClipPlugin.exe im Hauptordner." }

      - name: Generate update.json
        shell: pwsh
        run: |
          $asset = "RaidClipPlugin-$env:VERSION-win-x64.zip"
          $hash = (Get-FileHash $asset -Algorithm SHA256).Hash.ToLowerInvariant()
          $update = [ordered]@{
            latestVersion = $env:VERSION
            downloadUrl = "https://github.com/Funjii95/RaidClipPlugin/releases/download/v$env:VERSION/$asset"
            changelog = "Kritischer Hotfix: Auto-Update verwendet ausschließlich ZIP-Pakete. Installer-EXE-Dateien werden nicht mehr als Update-Payload akzeptiert, damit RaidClipPlugin.exe nicht versehentlich durch den Installer ersetzt wird. Zusätzlich wurde das GUI-Logging gegen bereits geschlossene Fenster abgesichert."
            sha256 = $hash
          }
          $update | ConvertTo-Json -Depth 4 | Set-Content -Path update.json -Encoding UTF8
          $json = Get-Content update.json -Raw | ConvertFrom-Json
          if (-not $json.downloadUrl.EndsWith('.zip')) { throw 'update.json zeigt nicht auf ein ZIP.' }
          if ($json.downloadUrl -like '*Setup*.exe*') { throw 'update.json zeigt auf den Installer.' }

      - name: Create GitHub release
        shell: pwsh
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          $notes = "Kritischer Hotfix 1.9.15 - Auto-Update zeigt jetzt auf das ZIP-Paket statt auf den Installer. Der Updater akzeptiert keine Installer-EXE mehr als Payload. GUI-Logging ignoriert Logs sicher, wenn das Fenster bereits geschlossen wurde. Wichtig: Falls deine aktuell installierte RaidClipPlugin.exe bereits den Installer startet, bitte diese Version einmal manuell per Installer installieren oder das ZIP entpacken. Danach funktionieren zukünftige Auto-Updates wieder korrekt."
          gh release create "v$env:VERSION" "RaidClipPlugin-$env:VERSION-win-x64.zip" "RaidClipPluginSetup-$env:VERSION.exe" update.json --title "RaidClipPlugin v$env:VERSION" --notes $notes || gh release upload "v$env:VERSION" "RaidClipPlugin-$env:VERSION-win-x64.zip" "RaidClipPluginSetup-$env:VERSION.exe" update.json --clobber
