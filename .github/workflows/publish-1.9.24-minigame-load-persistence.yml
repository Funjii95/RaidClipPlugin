name: Publish 1.9.27 Default Chat Text Repair

on:
  workflow_dispatch:

permissions:
  contents: write
  actions: read

jobs:
  patch-build-release:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x
          dotnet-quality: preview

      - name: Repair default chat text normalization
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          $patchBase64 = ''
          $patchText = [System.Text.Encoding]::UTF8.GetString([Convert]::FromBase64String($patchBase64))
          [System.IO.File]::WriteAllText('patch-1927-default-texts.ps1', $patchText, [System.Text.UTF8Encoding]::new($false))
          ./patch-1927-default-texts.ps1

      - name: Build
        shell: pwsh
        run: dotnet build RaidClipPlugin/RaidClipPlugin.csproj -c Release

      - name: Commit patch
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add RaidClipPlugin/Services/ConfigurationService.cs RaidClipPlugin/RaidClipPlugin.csproj
          if (git diff --cached --quiet) {
            Write-Host "No source changes to commit."
          } else {
            git commit -m "Repair default chat text restoration"
            git push
          }

      - name: Publish app
        shell: pwsh
        run: dotnet publish RaidClipPlugin/RaidClipPlugin.csproj -c Release -r win-x64 --self-contained true -p:PublishSingleFile=true -p:IncludeNativeLibrariesForSelfExtract=true -o publish/RaidClipPlugin

      - name: Build installer package
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          Compress-Archive -Path publish/RaidClipPlugin/* -DestinationPath RaidClipPlugin-1.9.27-win-x64.zip -Force
          $hash = (Get-FileHash RaidClipPlugin-1.9.27-win-x64.zip -Algorithm SHA256).Hash.ToLowerInvariant()
          $downloadUrl = "https://github.com/Funjii95/RaidClipPlugin/releases/download/v1.9.27/RaidClipPlugin-1.9.27-win-x64.zip"
          $manifest = [ordered]@{
            latestVersion = "1.9.27"
            downloadUrl = $downloadUrl
            changelog = "Hotfix: Leere gespeicherte Standardantworten werden automatisch repariert. Betrifft Raid-Nachricht, !clip/Raidclips, Duel und Heist-Chattexte."
            sha256 = $hash
          }
          $manifest | ConvertTo-Json -Depth 5 | Set-Content -Path update.json -Encoding UTF8

      - name: Create GitHub Release
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          $ErrorActionPreference = 'Stop'
          $notesPath = 'release-notes-1.9.27.md'
          @(
            'Hotfix 1.9.27'
            ''
            '- Leere gespeicherte Raid-Nachrichten werden wieder mit dem Standardtext gefüllt.'
            '- Leere !clip/Raidclip-Antworten werden wieder mit Standardantworten gefüllt.'
            '- Leere Duel- und Heist-Chattexte werden automatisch repariert.'
            '- Projektversion auf 1.9.27 angehoben.'
          ) | Set-Content -Path $notesPath -Encoding UTF8
          gh release delete v1.9.27 --yes --cleanup-tag 2>$null || $true
          gh release create v1.9.27 RaidClipPlugin-1.9.27-win-x64.zip update.json --title "RaidClipPlugin 1.9.27" --notes-file $notesPath
