name: Publish 1.9.26 Settings Persistence Hotfix

on:
  workflow_dispatch:

permissions:
  contents: write
  actions: read

jobs:
  build-release:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x
          dotnet-quality: preview

      - name: Build
        shell: pwsh
        run: dotnet build RaidClipPlugin/RaidClipPlugin.csproj -c Release

      - name: Publish app
        shell: pwsh
        run: |
          dotnet publish RaidClipPlugin/RaidClipPlugin.csproj -c Release -r win-x64 --self-contained true -p:PublishSingleFile=true -p:IncludeNativeLibrariesForSelfExtract=true -o publish/RaidClipPlugin

      - name: Build installer package
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          Compress-Archive -Path publish/RaidClipPlugin/* -DestinationPath RaidClipPlugin-1.9.26-win-x64.zip -Force
          $hash = (Get-FileHash RaidClipPlugin-1.9.26-win-x64.zip -Algorithm SHA256).Hash.ToLowerInvariant()
          $downloadUrl = "https://github.com/Funjii95/RaidClipPlugin/releases/download/v1.9.26/RaidClipPlugin-1.9.26-win-x64.zip"
          $manifest = [ordered]@{
            latestVersion = "1.9.26"
            downloadUrl = $downloadUrl
            changelog = "Hotfix: Einstellungen werden wieder zuverlässig gespeichert. Spotify-Connect speichert die komplette Musikwunsch-Konfiguration, Belohnungen aktualisieren liest keine fremden Modul-Einstellungen mehr ein."
            sha256 = $hash
          }
          $manifest | ConvertTo-Json -Depth 5 | Set-Content -Path update.json -Encoding UTF8

      - name: Create GitHub Release
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          $ErrorActionPreference = 'Stop'
          $notesPath = 'release-notes-1.9.26.md'
          @(
            'Hotfix 1.9.26'
            ''
            '- Einstellungen bleiben nach Neustart wieder erhalten.'
            '- Spotify-Verbindung speichert nicht mehr nur Client-ID/Redirect, sondern die komplette Musikwunsch-Konfiguration.'
            '- Belohnungen aktualisieren nutzt nicht mehr den globalen Einstellungsleser und wird dadurch nicht mehr von anderen Modulen blockiert.'
            '- Projektversion auf 1.9.26 angehoben.'
          ) | Set-Content -Path $notesPath -Encoding UTF8
          gh release delete v1.9.26 --yes --cleanup-tag 2>$null || $true
          gh release create v1.9.26 RaidClipPlugin-1.9.26-win-x64.zip update.json --title "RaidClipPlugin 1.9.26" --notes-file $notesPath
