name: Publish 1.9.24 Settings Persistence Hotfix

on:
  workflow_dispatch:

permissions:
  contents: write
  actions: read

jobs:
  patch-build-release:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x
          dotnet-quality: preview

      - name: Patch settings load precedence
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          $patchBase64 = ''
          $patchText = [System.Text.Encoding]::UTF8.GetString([Convert]::FromBase64String($patchBase64))
          [System.IO.File]::WriteAllText('patch-1924.ps1', $patchText, [System.Text.UTF8Encoding]::new($false))
          ./patch-1924.ps1

      - name: Build
        shell: pwsh
        run: dotnet build RaidClipPlugin/RaidClipPlugin.csproj -c Release

      - name: Commit patch
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add RaidClipPlugin/Services/ConfigurationService.cs RaidClipPlugin/RaidClipPlugin.csproj
          if (git diff --cached --quiet) {
            Write-Host "No source changes to commit."
          } else {
            git commit -m "Fix saved settings load precedence"
            git push
          }

      - name: Publish app
        shell: pwsh
        run: |
          dotnet publish RaidClipPlugin/RaidClipPlugin.csproj -c Release -r win-x64 --self-contained true -p:PublishSingleFile=true -p:IncludeNativeLibrariesForSelfExtract=true -o publish/RaidClipPlugin

      - name: Build installer package
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          Compress-Archive -Path publish/RaidClipPlugin/* -DestinationPath RaidClipPlugin-1.9.24-win-x64.zip -Force
          $hash = (Get-FileHash RaidClipPlugin-1.9.24-win-x64.zip -Algorithm SHA256).Hash.ToLowerInvariant()
          $downloadUrl = "https://github.com/Funjii95/RaidClipPlugin/releases/download/v1.9.24/RaidClipPlugin-1.9.24-win-x64.zip"
          $manifest = [ordered]@{
            latestVersion = "1.9.24"
            downloadUrl = $downloadUrl
            changelog = "Hotfix: gespeicherte GUI-Einstellungen bleiben nach Neustart erhalten. Alte Modulbloecke ueberschreiben neue GUI-Werte nicht mehr."
            sha256 = $hash
          }
          $manifest | ConvertTo-Json -Depth 5 | Set-Content -Path update.json -Encoding UTF8

      - name: Create GitHub Release
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          $ErrorActionPreference = 'Stop'
          $notesPath = 'release-notes-1.9.24.md'
          @(
            'Hotfix 1.9.24'
            ''
            '- Gespeicherte GUI-Einstellungen werden wieder korrekt geladen.'
            '- Minigame-Haken und einzelne Minigame-Werte bleiben nach Neustart erhalten.'
            '- Alte settings.json-Modulbloecke ueberschreiben neue GUI-Felder nicht mehr.'
          ) | Set-Content -Path $notesPath -Encoding UTF8
          gh release delete v1.9.24 --yes --cleanup-tag 2>$null || $true
          gh release create v1.9.24 RaidClipPlugin-1.9.24-win-x64.zip update.json --title "RaidClipPlugin 1.9.24" --notes-file $notesPath
