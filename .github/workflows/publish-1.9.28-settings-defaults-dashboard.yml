name: Publish 1.9.33 Scoped Settings Save Fix

on:
  push:
    branches: [main]
    paths:
      - '.github/workflows/publish-1.9.28-settings-defaults-dashboard.yml'
  workflow_dispatch:

permissions:
  contents: write
  actions: read

env:
  VERSION: '1.9.33'

jobs:
  release:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'
          dotnet-quality: preview

      - name: Repair settings persistence, default messages and dashboard
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          $version = $env:VERSION

          $csprojPath = 'RaidClipPlugin/RaidClipPlugin.csproj'
          $project = Get-Content -Raw -Encoding UTF8 $csprojPath
          $project = [regex]::Replace($project, '<Version>[^<]+</Version>', "<Version>$version</Version>")
          $project = [regex]::Replace($project, '<FileVersion>[^<]+</FileVersion>', "<FileVersion>$version.0</FileVersion>")
          if ($project -match '<AssemblyVersion>') {
            $project = [regex]::Replace($project, '<AssemblyVersion>[^<]+</AssemblyVersion>', "<AssemblyVersion>$version.0</AssemblyVersion>")
          }
          Set-Content -Path $csprojPath -Value $project -Encoding UTF8

          $configPath = 'RaidClipPlugin/Services/ConfigurationService.cs'
          $config = Get-Content -Raw -Encoding UTF8 $configPath

          if ($config -notmatch 'LoadForEditing\(') {
            $newLoad = @'
              public AppConfig Load()
              {
                  var appConfig = LoadForEditing();
                  ValidateTechnicalSettings(appConfig);
                  return appConfig;
          }
          
          
              public AppConfig LoadForEditing()
              {
                  IConfiguration configuration = new ConfigurationBuilder()
                      .SetBasePath(AppContext.BaseDirectory)
                      .AddJsonFile("Config/config.template.json", optional: false)
                      .Build();
          
          
                  var appConfig = new AppConfig();
                  configuration.Bind(appConfig);
          
          
                  var credentials = new TwitchCredentialStore().Load();
                  appConfig.Twitch.ClientId = credentials.ClientId;
                  appConfig.Twitch.ClientSecret = credentials.ClientSecret;
          
          
                  if (string.IsNullOrWhiteSpace(appConfig.Twitch.BroadcasterLogin))
                  {
                      appConfig.Twitch.BroadcasterLogin = "Funjii";
          }
          
          
                  if (string.IsNullOrWhiteSpace(appConfig.OBS.Host))
                  {
                      appConfig.OBS.Host = "127.0.0.1";
          }
          
          
                  ApplySavedGuiSettings(appConfig);
                  Normalize(appConfig);
                  return appConfig;
          }
          '@
            $config = [regex]::Replace(
              $config,
              '    public AppConfig Load\(\)\s*\{.*?ValidateTechnicalSettings\(appConfig\);\s*return appConfig;\s*\}',
              $newLoad,
              [System.Text.RegularExpressions.RegexOptions]::Singleline)
          }

          $config = [regex]::Replace(
            $config,
            '        Normalize\(config\);\s*ValidateTechnicalSettings\(config\);\s*ValidateGuiSettings\(config\);',
            "        Normalize(config);`r`n        ValidateGuiSettings(config);")
          $config = [regex]::Replace(
            $config,
            '    public void SaveGuiSettings\(AppConfig config\)\s*\{\s*Normalize\(config\);\s*ValidateGuiSettings\(config\);',
            "    public void SaveGuiSettings(AppConfig config)`r`n    {`r`n        Normalize(config);",
            [System.Text.RegularExpressions.RegexOptions]::Singleline)
          $config = $config.Replace(
            '        File.WriteAllText(
            UserSettingsPath,
            JsonSerializer.Serialize(settings, JsonOptions));',
            '        WriteSettingsFile(settings);')
          $config = $config.Replace(
            '        File.WriteAllText(
            UserSettingsPath,
            JsonSerializer.Serialize(settings, JsonOptions));',
            '        WriteSettingsFile(settings);')
          $config = $config.Replace(
            '        File.WriteAllText(
            UserSettingsPath,
            JsonSerializer.Serialize(settings, JsonOptions));',
            '        WriteSettingsFile(settings);')
          $config = [regex]::Replace(
            $config,
            'File\.WriteAllText\(\s*UserSettingsPath,\s*JsonSerializer\.Serialize\(settings,\s*JsonOptions\)\);',
            'WriteSettingsFile(settings);',
            [System.Text.RegularExpressions.RegexOptions]::Singleline)
          $config = [regex]::Replace(
            $config,
            '\s*ValidateMusicRequestSettings\(musicRequests\);',
            '',
            [System.Text.RegularExpressions.RegexOptions]::Singleline)
          if ($config -notmatch 'SettingsLock') {
            $config = $config.Replace(
              '    private static readonly JsonSerializerOptions JsonOptions = new()',
              '    private static readonly SemaphoreSlim SettingsLock = new(1, 1);' + "`r`n`r`n" + '    private static readonly JsonSerializerOptions JsonOptions = new()')
          }
          if ($config -notmatch 'private static void WriteSettingsFile') {
            $settingsHelper = "    private static void WriteSettingsFile(GuiSettings settings)`r`n    {`r`n        var path = UserSettingsPath;`r`n        var json = JsonSerializer.Serialize(settings, JsonOptions);`r`n        var tempPath = path + "".tmp"";`r`n        File.WriteAllText(tempPath, json, new System.Text.UTF8Encoding(false));`r`n        File.Copy(tempPath, path, true);`r`n        File.Delete(tempPath);`r`n        _ = JsonSerializer.Deserialize<GuiSettings>(File.ReadAllText(path, System.Text.Encoding.UTF8), JsonOptions) ?? throw new InvalidOperationException(""Einstellungen wurden geschrieben, konnten aber nicht geprüft werden."");`r`n        Console.WriteLine(""💾 Einstellungen gespeichert: "" + path);`r`n    }`r`n`r`n`r`n"
            $config = $config.Replace(
              '    private static void ApplySavedGuiSettings(AppConfig config)',
              $settingsHelper + '    private static void ApplySavedGuiSettings(AppConfig config)')
          }
          $config = [regex]::Replace(
            $config,
            '    private static void WriteSettingsFile\(GuiSettings settings\)\s*\{.*?\n    \}\s*\n\s*private static void ApplySavedGuiSettings',
            @'
              private static void WriteSettingsFile(GuiSettings settings)
              {
                  SettingsLock.Wait();
                  try
                  {
                      var path = UserSettingsPath;
                      var directory = Path.GetDirectoryName(path)!;
                      Directory.CreateDirectory(directory);
                      settings.Minigame ??= new MinigameConfig();
                      settings.MusicRequests ??= new MusicRequestConfig();
                      settings.Moderation ??= new ModerationConfig();
                      settings.AutoDiscordClipPoster ??= new AutoDiscordClipPosterConfig();
                      settings.Update ??= new UpdateConfig();
                      settings.ModuleHealth ??= new ModuleHealthConfig();
                      var json = JsonSerializer.Serialize(settings, JsonOptions);
                      var tempPath = Path.Combine(
                          directory,
                          "settings." + Guid.NewGuid().ToString("N") + ".tmp");
                      var backupPath = path + ".bak";
          
                      try
                      {
                          using (var stream = new FileStream(
                                     tempPath,
                                     FileMode.CreateNew,
                                     FileAccess.Write,
                                     FileShare.None,
                                     4096,
                                     FileOptions.WriteThrough))
                          using (var writer = new StreamWriter(
                                     stream,
                                     new System.Text.UTF8Encoding(false)))
                          {
                              writer.Write(json);
                              writer.Flush();
                              stream.Flush(true);
                }
          
                          if (File.Exists(path))
                              File.Copy(path, backupPath, true);
          
                          File.Copy(tempPath, path, true);
          
                          var verified = JsonSerializer.Deserialize<GuiSettings>(
                              File.ReadAllText(path, System.Text.Encoding.UTF8),
                              JsonOptions) ??
                              throw new InvalidOperationException(
                                  "Einstellungen wurden geschrieben, konnten aber nicht geprüft werden.");
                          if (verified.Minigame is null ||
                              verified.MusicRequests is null ||
                              verified.Moderation is null ||
                              verified.AutoDiscordClipPoster is null)
                              throw new InvalidOperationException(
                                  "Einstellungen wurden geschrieben, aber wichtige Bereiche fehlen.");
          
                          Console.WriteLine("💾 Einstellungen gespeichert: " + path);
            }
                      finally
                      {
                          try
                          {
                              if (File.Exists(tempPath))
                                  File.Delete(tempPath);
                }
                          catch
                          {
                }
            }
          }
                  finally
                  {
                      SettingsLock.Release();
          }
          }
          
          
              private static void ApplySavedGuiSettings
          '@,
            [System.Text.RegularExpressions.RegexOptions]::Singleline)
          $config = $config.Replace(
            '            if (settings.ModuleHealth is not null)' + "`r`n" + '                config.ModuleHealth = settings.ModuleHealth;',
            '            if (settings.ModuleHealth is not null)' + "`r`n" + '                config.ModuleHealth = settings.ModuleHealth;' + "`r`n" + '            if (settings.Moderation is not null)' + "`r`n" + '                config.Moderation = settings.Moderation;' + "`r`n" + '            if (settings.AutoDiscordClipPoster is not null)' + "`r`n" + '                config.AutoDiscordClipPoster = settings.AutoDiscordClipPoster;' + "`r`n" + '            if (settings.Update is not null)' + "`r`n" + '                config.Update = settings.Update;')
          if ($config -notmatch 'public ModerationConfig\? Moderation') {
            $config = $config.Replace(
              '        public ModuleHealthConfig? ModuleHealth { get; set; }',
              '        public ModuleHealthConfig? ModuleHealth { get; set; }' + "`r`n" + '        public ModerationConfig? Moderation { get; set; }' + "`r`n" + '        public AutoDiscordClipPosterConfig? AutoDiscordClipPoster { get; set; }' + "`r`n" + '        public UpdateConfig? Update { get; set; }')
          }
          $duplicateGuiSettingsProps = '        public ModuleHealthConfig? ModuleHealth { get; set; }' + "`r`n" + '        public ModerationConfig? Moderation { get; set; }' + "`r`n" + '        public AutoDiscordClipPosterConfig? AutoDiscordClipPoster { get; set; }' + "`r`n" + '        public UpdateConfig? Update { get; set; }' + "`r`n" + '        public ModerationConfig? Moderation { get; set; }' + "`r`n" + '        public AutoDiscordClipPosterConfig? AutoDiscordClipPoster { get; set; }' + "`r`n" + '        public UpdateConfig? Update { get; set; }'
          $config = $config.Replace(
            $duplicateGuiSettingsProps,
            '        public ModuleHealthConfig? ModuleHealth { get; set; }' + "`r`n" + '        public ModerationConfig? Moderation { get; set; }' + "`r`n" + '        public AutoDiscordClipPosterConfig? AutoDiscordClipPoster { get; set; }' + "`r`n" + '        public UpdateConfig? Update { get; set; }')

          $config = [regex]::Replace(
            $config,
            'config\.Chat\.RaidMessageTemplate\s*=\s*\(config\.Chat\.RaidMessageTemplate \?\? ""\)\.Trim\(\);',
            'config.Chat.RaidMessageTemplate = NormalizeTextOrDefault(config.Chat.RaidMessageTemplate, new ChatConfig().RaidMessageTemplate);')

          $config = [regex]::Replace(
            $config,
            'config\.LiveChat = LiveChatService\.NormalizeConfig\(config\.LiveChat\);\s*config\.Duel \?\?= new DuelConfig\(\);',
            "config.LiveChat = LiveChatService.NormalizeConfig(config.LiveChat);`r`n        config.Heist ??= new HeistConfig();`r`n        config.Duel ??= new DuelConfig();`r`n        FillEmptyStringPropertiesFromDefaults(config.Heist);`r`n        FillEmptyStringPropertiesFromDefaults(config.Duel);")

          if ($config -notmatch 'private static void FillEmptyStringPropertiesFromDefaults') {
            $helpers = @'
              private static void FillEmptyStringPropertiesFromDefaults<T>(T target)
                  where T : class, new()
              {
                  var defaults = new T();
                  foreach (var property in typeof(T).GetProperties())
                  {
                      if (property.PropertyType != typeof(string) ||
                          !property.CanRead || !property.CanWrite)
                      {
                          continue;
            }
          
                      var current = property.GetValue(target) as string;
                      var fallback = property.GetValue(defaults) as string ?? "";
                      property.SetValue(
                          target,
                          string.IsNullOrWhiteSpace(current)
                              ? fallback
                              : current.Trim());
          }
          }
          
          
          '@
            $config = $config.Replace(
              '    private static void NormalizeMusicRequests(MusicRequestConfig config)',
              $helpers + '    private static void NormalizeMusicRequests(MusicRequestConfig config)')
          }

          if ($config -notmatch 'FillEmptyStringPropertiesFromDefaults\(config\.ChatMessages\)') {
            $config = $config.Replace(
              "        config.ChatMessages ??= new MusicRequestChatMessages();`r`n        config.ModeratorCommands ??= new MusicModeratorCommands();",
              "        config.ChatMessages ??= new MusicRequestChatMessages();`r`n        config.ModeratorCommands ??= new MusicModeratorCommands();`r`n        FillEmptyStringPropertiesFromDefaults(config.ChatMessages);`r`n        FillEmptyStringPropertiesFromDefaults(config.ModeratorCommands);")
            $config = $config.Replace(
              "        config.ChatMessages ??= new MusicRequestChatMessages();`n        config.ModeratorCommands ??= new MusicModeratorCommands();",
              "        config.ChatMessages ??= new MusicRequestChatMessages();`n        config.ModeratorCommands ??= new MusicModeratorCommands();`n        FillEmptyStringPropertiesFromDefaults(config.ChatMessages);`n        FillEmptyStringPropertiesFromDefaults(config.ModeratorCommands);")
          }

          $clipMessageNames = @(
            'Starting','Success','SuccessDiscord','Cooldown','Offline','Forbidden',
            'TwitchError','PartialDiscord','QueueFull','Busy','LimitReached','MissingScope')
          foreach ($name in $clipMessageNames) {
            $config = $config.Replace(
              "        clip.ChatMessages.$name ??= defaultMessages.$name;",
              "        clip.ChatMessages.$name = NormalizeClipChatMessage(clip.ChatMessages.$name, defaultMessages.$name);")
          }

          if ($config -notmatch 'private static ClipChatMessage NormalizeClipChatMessage') {
            $clipHelper = @'
              private static ClipChatMessage NormalizeClipChatMessage(
                  ClipChatMessage? message,
                  ClipChatMessage fallback)
              {
                  return message is null
                      ? fallback
                      : new ClipChatMessage(
                          message.Enabled,
                          NormalizeTextOrDefault(message.Text, fallback.Text));
          }
          
          
          '@
            $config = $config.Replace(
              '    private static List<string> NormalizeUsers(List<string>? users) =>',
              $clipHelper + '    private static List<string> NormalizeUsers(List<string>? users) =>')
          }

          $config = $config.Replace(
            'clone.ChatText = (clone.ChatText ?? "").Trim();',
            'var fallbackText = clone.From switch { <= 31 => MinigameConfig.CreateDefaultRanges()[0].ChatText, <= 50 => MinigameConfig.CreateDefaultRanges()[1].ChatText, <= 70 => MinigameConfig.CreateDefaultRanges()[2].ChatText, _ => MinigameConfig.CreateDefaultRanges()[3].ChatText }; clone.ChatText = NormalizeTextOrDefault(clone.ChatText, fallbackText);')

          Set-Content -Path $configPath -Value $config -Encoding UTF8

          $mainPath = 'RaidClipPlugin/MainForm.cs'
          $main = Get-Content -Raw -Encoding UTF8 $mainPath
          $main = [regex]::Replace(
            $main,
            '(private void LoadSettingsIntoControls\(\)\s*\{\s*try\s*\{\s*)var config = _configurationService\.Load\(\);',
            '$1var config = _configurationService.LoadForEditing();',
            [System.Text.RegularExpressions.RegexOptions]::Singleline)
          $main = [regex]::Replace(
            $main,
            '(private AppConfig ReadSettingsFromControls\(\)\s*\{\s*)var config = _configurationService\.Load\(\);',
            '$1var config = _configurationService.LoadForEditing();',
            [System.Text.RegularExpressions.RegexOptions]::Singleline)
          if ($main -notmatch 'ReadGeneralSettingsFromControls') {
            $generalReader = @'
              private AppConfig ReadGeneralSettingsFromControls()
              {
                  var config = _configurationService.LoadForEditing();
                  config.UiTheme = ThemeKeyFromSelection();
                  config.Twitch.BroadcasterLogin = _twitchChannelBox.Text
                      .Trim()
                      .TrimStart('@');
                  config.OBS.Host = _obsHostBox.Text.Trim();
                  config.OBS.Port = decimal.ToInt32(_obsPortControl.Value);
                  config.OBS.Password = _obsPasswordBox.Text;
                  config.Twitch.ClipLookbackDays =
                      decimal.ToInt32(_lookbackControl.Value);
                  config.Twitch.ClipRetryAttempts =
                      decimal.ToInt32(_retryControl.Value);
                  config.Player.DurationSeconds =
                      decimal.ToInt32(_durationControl.Value);
                  config.Player.VolumePercent =
                      decimal.ToInt32(_volumeControl.Value);
                  config.Twitch.RaidCooldownMinutes =
                      decimal.ToInt32(_cooldownControl.Value);
                  config.Twitch.RaidDelaySeconds =
                      decimal.ToInt32(_raidDelayControl.Value);
                  config.Player.BlacklistedClipIds = _blacklistBox.Text
                                .Split(
                          new[] { ',', ';', '\r', '\n' },
                          StringSplitOptions.RemoveEmptyEntries)
                      .Select(id => id.Trim())
                      .Where(id => id.Length > 0)
                      .Distinct(StringComparer.OrdinalIgnoreCase)
                      .ToList();
                  config.Chat.SendRaidMessage = _sendRaidMessageCheck.Checked;
                  config.Chat.SendShoutout = _sendShoutoutCheck.Checked;
                  config.Chat.RaidMessageTemplate = _chatTemplateBox.Text.Trim();
                  config.Update.Enabled = _autoUpdateCheck.Checked;
                  config.Moderation.Enabled = _moderationEnabledCheck.Checked;
                  config.Moderation.ShowMessagesInLog = _chatLogCheck.Checked;
                  config.Moderation.AutoFilterEnabled = _autoFilterCheck.Checked;
                  config.Moderation.WhitelistModsAndVips =
                                _modVipWhitelistCheck.Checked;
                  config.Moderation.TimeoutSeconds =
                      decimal.ToInt32(_moderationTimeoutControl.Value);
                  config.Moderation.BlockedWords = _blockedWordsBox.Text
                                .Split(
                          new[] { ',', ';', '\r', '\n' },
                          StringSplitOptions.RemoveEmptyEntries)
                      .Select(word => word.Trim())
                      .Where(word => word.Length > 0)
                      .Distinct(StringComparer.OrdinalIgnoreCase)
                      .ToList();
                  ReadModerationCenterSettings(config);
                  config.ModuleHealth.Enabled = _healthcheckEnabledCheck.Checked;
                  config.ModuleHealth.AutoRestartEnabled = _healthAutoRestartCheck.Checked;
                  config.ModuleHealth.GambleHealthcheckEnabled = _gambleHealthcheckCheck.Checked;
                  config.ModuleHealth.IntervalSeconds =
                      decimal.ToInt32(_healthIntervalControl.Value);
                  config.ModuleHealth.MaxRestartAttempts =
                      decimal.ToInt32(_healthMaxRestartsControl.Value);
                  config.ModuleHealth.RestartCooldownSeconds =
                      decimal.ToInt32(_healthRestartCooldownControl.Value);
                  return config;
              }
          
          
          '@
            $main = $main.Replace(
              '    private AppConfig ReadSettingsFromControls()',
              $generalReader + '    private AppConfig ReadSettingsFromControls()')
          }
          $main = $main.Replace(
            '            var config = ReadSettingsFromControls();',
            '            var config = ReadGeneralSettingsFromControls();')
          $main = [regex]::Replace(
            $main,
            '(private async void SaveMinigameSettingsFromControls\(\)\s*\{.*?try\s*\{\s*)var config = _configurationService\.Load\(\);',
            '$1var config = _configurationService.LoadForEditing();',
            [System.Text.RegularExpressions.RegexOptions]::Singleline)
          $main = $main.Replace(
            'SetMinigameStatus("Einstellungen ungültig", ErrorColor);',
            'SetMinigameStatus("Fehler: " + exception.Message, ErrorColor);')
          $main = $main.Replace(
            "SetMinigameStatus(""Einstellungen ungÃ¼ltig"", ErrorColor);`r`n                ShowSection(""minigame"");",
            'SetMinigameStatus("Fehler: " + exception.Message, ErrorColor);')
          $main = $main.Replace(
            "SetSpotifyStatus(""Einstellungen ungÃ¼ltig"", ErrorColor);`r`n                ShowSection(""music"");",
            'SetSpotifyStatus("Fehler: " + exception.Message, ErrorColor);')
          $main = $main.Replace(
            "SetMinigameStatus(""Einstellungen ungÃ¼ltig"", ErrorColor);`n                ShowSection(""minigame"");",
            'SetMinigameStatus("Fehler: " + exception.Message, ErrorColor);')
          $main = $main.Replace(
            "SetSpotifyStatus(""Einstellungen ungÃ¼ltig"", ErrorColor);`n                ShowSection(""music"");",
            'SetSpotifyStatus("Fehler: " + exception.Message, ErrorColor);')
          Set-Content -Path $mainPath -Value $main -Encoding UTF8

          $musicPath = 'RaidClipPlugin/MainForm.MusicRequests.cs'
          $music = Get-Content -Raw -Encoding UTF8 $musicPath
          $music = [regex]::Replace(
            $music,
            '(private void SaveMusicRequestSettingsFromControls\(\)\s*\{.*?try\s*\{\s*)var config = _configurationService\.Load\(\);',
            '$1var config = _configurationService.LoadForEditing();',
            [System.Text.RegularExpressions.RegexOptions]::Singleline)
          $music = [regex]::Replace(
            $music,
            '(private MusicRequestConfig ReadSpotifyConnectionSettings\(\)\s*\{\s*)var config = _configurationService\.Load\(\);',
            '$1var config = _configurationService.LoadForEditing();',
            [System.Text.RegularExpressions.RegexOptions]::Singleline)
          $music = [regex]::Replace(
            $music,
            '(private async Task RefreshMusicRewardsAsync\(\)\s*\{.*?try\s*\{\s*)var config = _configurationService\.Load\(\);',
            '$1var config = _configurationService.LoadForEditing();',
            [System.Text.RegularExpressions.RegexOptions]::Singleline)
          $music = $music.Replace(
            'SetSpotifyStatus("Einstellungen ungültig", ErrorColor);',
            'SetSpotifyStatus("Fehler: " + exception.Message, ErrorColor);')
          Set-Content -Path $musicPath -Value $music -Encoding UTF8

          $heistPath = 'RaidClipPlugin/MainForm.HeistCommands.cs'
          $heist = Get-Content -Raw -Encoding UTF8 $heistPath
          if ($heist -notmatch 'private static string ReadHeistMessage') {
            $helper = "    private static string ReadHeistMessage(TextBox box, string fallback) =>`r`n        string.IsNullOrWhiteSpace(box.Text) ? fallback : box.Text.Trim();`r`n`r`n`r`n    private static string HeistTextOrDefault(string? value, string fallback) =>`r`n        string.IsNullOrWhiteSpace(value) ? fallback : value.Trim();`r`n`r`n`r`n"
            $heist = $heist.Replace('    private void ReadHeistCommandsSettings(AppConfig config)', $helper + '    private void ReadHeistCommandsSettings(AppConfig config)')
          }
          if ($config -notmatch 'NormalizeMusicRequestChatMessages\(config\.ChatMessages\)') {
            $musicMessageHelper = @'
              private static void NormalizeMusicRequestChatMessages(
                  MusicRequestChatMessages messages)
              {
                  var defaults = new MusicRequestChatMessages();
                  messages.Queued = NormalizeTextOrDefault(messages.Queued, defaults.Queued);
                  messages.Playing = NormalizeTextOrDefault(messages.Playing, defaults.Playing);
                  messages.NotFound = NormalizeTextOrDefault(messages.NotFound, defaults.NotFound);
                  messages.NoDevice = NormalizeTextOrDefault(messages.NoDevice, defaults.NoDevice);
                  messages.TooLong = NormalizeTextOrDefault(messages.TooLong, defaults.TooLong);
                  messages.ExplicitBlocked = NormalizeTextOrDefault(messages.ExplicitBlocked, defaults.ExplicitBlocked);
                  messages.Cooldown = NormalizeTextOrDefault(messages.Cooldown, defaults.Cooldown);
                  messages.QueueFull = NormalizeTextOrDefault(messages.QueueFull, defaults.QueueFull);
                  messages.Blacklisted = NormalizeTextOrDefault(messages.Blacklisted, defaults.Blacklisted);
                  messages.InvalidInput = NormalizeTextOrDefault(messages.InvalidInput, defaults.InvalidInput);
          }
          
          
          '@
            $config = $config.Replace(
              '    public static void ValidateMusicRequestSettings(MusicRequestConfig config)',
              $musicMessageHelper + '    public static void ValidateMusicRequestSettings(MusicRequestConfig config)')
            $config = $config.Replace(
              '        FillEmptyStringPropertiesFromDefaults(config.ChatMessages);',
              '        FillEmptyStringPropertiesFromDefaults(config.ChatMessages);' + "`r`n        NormalizeMusicRequestChatMessages(config.ChatMessages);")
            Set-Content -Path $configPath -Value $config -Encoding UTF8
          }
          $loadPattern = '        var values = new\[\] \{ h\.StartMessage,h\.JoinMessage,h\.AlreadyJoinedMessage,h\.NoActiveHeistMessage,h\.MaximumParticipantsMessage,\s*h\.NotEnoughParticipantsMessage,h\.EvaluationMessage,h\.SuccessMessage,h\.FailureMessage \};\s*for\(var i=0;i<values\.Length;i\+\+\)_heistMessageBoxes\[i\]\.Text=values\[i\];'
          $loadReplacement = "        var defaults = new HeistConfig();`r`n        var values = new[] { HeistTextOrDefault(h.StartMessage,defaults.StartMessage),HeistTextOrDefault(h.JoinMessage,defaults.JoinMessage),HeistTextOrDefault(h.AlreadyJoinedMessage,defaults.AlreadyJoinedMessage),HeistTextOrDefault(h.NoActiveHeistMessage,defaults.NoActiveHeistMessage),HeistTextOrDefault(h.MaximumParticipantsMessage,defaults.MaximumParticipantsMessage),`r`n            HeistTextOrDefault(h.NotEnoughParticipantsMessage,defaults.NotEnoughParticipantsMessage),HeistTextOrDefault(h.EvaluationMessage,defaults.EvaluationMessage),HeistTextOrDefault(h.SuccessMessage,defaults.SuccessMessage),HeistTextOrDefault(h.FailureMessage,defaults.FailureMessage) };`r`n        for(var i=0;i<values.Length;i++)_heistMessageBoxes[i].Text=values[i];"
          $heist = [regex]::Replace($heist, $loadPattern, $loadReplacement, [System.Text.RegularExpressions.RegexOptions]::Singleline)
          $readPattern = '        h\.StartMessage=_heistMessageBoxes\[0\]\.Text; h\.JoinMessage=_heistMessageBoxes\[1\]\.Text; h\.AlreadyJoinedMessage=_heistMessageBoxes\[2\]\.Text;\s*h\.NoActiveHeistMessage=_heistMessageBoxes\[3\]\.Text; h\.MaximumParticipantsMessage=_heistMessageBoxes\[4\]\.Text;\s*h\.NotEnoughParticipantsMessage=_heistMessageBoxes\[5\]\.Text; h\.EvaluationMessage=_heistMessageBoxes\[6\]\.Text;\s*h\.SuccessMessage=_heistMessageBoxes\[7\]\.Text; h\.FailureMessage=_heistMessageBoxes\[8\]\.Text;'
          $readReplacement = "        var defaults = new HeistConfig();`r`n        h.StartMessage=ReadHeistMessage(_heistMessageBoxes[0], defaults.StartMessage); h.JoinMessage=ReadHeistMessage(_heistMessageBoxes[1], defaults.JoinMessage); h.AlreadyJoinedMessage=ReadHeistMessage(_heistMessageBoxes[2], defaults.AlreadyJoinedMessage);`r`n        h.NoActiveHeistMessage=ReadHeistMessage(_heistMessageBoxes[3], defaults.NoActiveHeistMessage); h.MaximumParticipantsMessage=ReadHeistMessage(_heistMessageBoxes[4], defaults.MaximumParticipantsMessage);`r`n        h.NotEnoughParticipantsMessage=ReadHeistMessage(_heistMessageBoxes[5], defaults.NotEnoughParticipantsMessage); h.EvaluationMessage=ReadHeistMessage(_heistMessageBoxes[6], defaults.EvaluationMessage);`r`n        h.SuccessMessage=ReadHeistMessage(_heistMessageBoxes[7], defaults.SuccessMessage); h.FailureMessage=ReadHeistMessage(_heistMessageBoxes[8], defaults.FailureMessage);"
          $heist = [regex]::Replace($heist, $readPattern, $readReplacement, [System.Text.RegularExpressions.RegexOptions]::Singleline)
          Set-Content -Path $heistPath -Value $heist -Encoding UTF8
          $dashPath = 'RaidClipPlugin/MainForm.DashboardModern.cs'
          if (Test-Path $dashPath) {
            $dash = Get-Content -Raw -Encoding UTF8 $dashPath
            $dash = $dash.Replace('button == _updateButton ? 164 : 142', 'button == _updateButton ? 198 : 142')
            $dash = $dash.Replace('button == _updateButton ? 164 : 142', 'button == _updateButton ? 198 : 142')
            $dash = $dash.Replace('main.RowStyles.Add(new RowStyle(SizeType.Absolute, 128));', 'main.RowStyles.Add(new RowStyle(SizeType.Absolute, 146));')
            $dash = $dash.Replace('main.RowStyles.Add(new RowStyle(SizeType.Absolute, 104));', 'main.RowStyles.Add(new RowStyle(SizeType.Absolute, 112));')
            $dash = $dash.Replace('panel.MinimumSize = new Size(112, 76);', 'panel.MinimumSize = new Size(112, 72);')
            $dash = $dash.Replace('Font = new Font("Segoe UI", 15F, FontStyle.Bold), ForeColor = color', 'Font = new Font("Segoe UI", 13.5F, FontStyle.Bold), ForeColor = color')
            $dash = $dash.Replace('Font = new Font("Segoe UI", 15F, FontStyle.Bold), ForeColor = TextColor', 'Font = new Font("Segoe UI", 12.5F, FontStyle.Bold), ForeColor = TextColor')
            $dash = $dash.Replace('Font = new Font("Segoe UI", 8.2F), ForeColor = MutedTextColor', 'Font = new Font("Segoe UI", 7.8F), ForeColor = MutedTextColor')
            Set-Content -Path $dashPath -Value $dash -Encoding UTF8
          }

      - name: Build
        shell: pwsh
        run: dotnet build RaidClipPlugin/RaidClipPlugin.csproj -c Release

      - name: Commit source changes
        shell: pwsh
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add RaidClipPlugin/Services/ConfigurationService.cs RaidClipPlugin/MainForm.cs RaidClipPlugin/MainForm.MusicRequests.cs RaidClipPlugin/MainForm.HeistCommands.cs RaidClipPlugin/MainForm.DashboardModern.cs RaidClipPlugin/RaidClipPlugin.csproj
          if (git diff --cached --quiet) {
            echo "No source changes to commit."
          } else {
            git commit -m "Fix scoped settings save for 1.9.33"
            git push
          }

      - name: Publish app
        shell: pwsh
        run: |
          dotnet publish RaidClipPlugin/RaidClipPlugin.csproj -c Release -r win-x64 --self-contained true -p:PublishSingleFile=true -p:IncludeNativeLibrariesForSelfExtract=true -o RaidClipPlugin/publish
          Compress-Archive -Path RaidClipPlugin/publish/* -DestinationPath "RaidClipPlugin-$env:VERSION-win-x64.zip" -Force

      - name: Build installer
        shell: pwsh
        run: |
          choco install innosetup -y --no-progress
          $programFilesX86 = [Environment]::GetFolderPath('ProgramFilesX86')
          $iscc = Join-Path (Join-Path $programFilesX86 'Inno Setup 6') 'ISCC.exe'
          if (Test-Path 'RaidClipPlugin/Installer/RaidClipPlugin.iss') {
            & $iscc "/DMyAppVersion=$env:VERSION" "RaidClipPlugin/Installer/RaidClipPlugin.iss"
            Copy-Item "RaidClipPlugin/installer-output/RaidClipPlugin-Setup-$env:VERSION.exe" "RaidClipPluginSetup-$env:VERSION.exe" -Force
          }

      - name: Create update manifest
        shell: pwsh
        run: |
          $zip = "RaidClipPlugin-$env:VERSION-win-x64.zip"
          $sha = (Get-FileHash $zip -Algorithm SHA256).Hash.ToLowerInvariant()
          $manifest = [ordered]@{
            latestVersion = $env:VERSION
            downloadUrl = "https://github.com/Funjii95/RaidClipPlugin/releases/download/v$env:VERSION/$zip"
            changelog = "Hotfix 1.9.33: Allgemeines Speichern überschreibt Spezialmodule nicht mehr mit Default-Controlwerten."
            sha256 = $sha
          }
          $manifest | ConvertTo-Json -Depth 4 | Set-Content -Path update.json -Encoding UTF8

      - name: Create release
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          $tag = "v$env:VERSION"
          $notes = @(
            "Hotfix 1.9.33",
            "",
            "- Allgemeines Speichern liest nur noch allgemeine GUI-Felder.",
            "- Spezialmodule wie Minigame, Musikwünsche, Heist, Duel, Clips, Giveaways und Auto-Poster werden nicht mehr durch Default-Controlwerte überschrieben.",
            "- Auto Discord Clip Poster wird jetzt gespeichert und nach Neustart geladen.",
            "- Moderation wird vollständig gespeichert, inklusive Linkfilter, Permit und User-/Domainlisten.",
            "- settings.json wird mit Lock, eindeutiger Temp-Datei, Backup und Verifikation geschrieben.",
            "- Alte settings.json-Dateien werden um fehlende neue Bereiche ergänzt.",
            "- Musikwunsch- und Heist-Standardtexte werden bei leeren Feldern wiederhergestellt.",
            "- ZIP, Installer und update.json werden veröffentlicht."
          ) -join [Environment]::NewLine
          git tag -f $tag
          git push origin $tag --force
          gh release delete $tag -y --cleanup-tag 2>$null || $true
          $assets = @("RaidClipPlugin-$env:VERSION-win-x64.zip", "update.json")
          if (Test-Path "RaidClipPluginSetup-$env:VERSION.exe") { $assets += "RaidClipPluginSetup-$env:VERSION.exe" }
          gh release create $tag @assets --title "RaidClipPlugin $env:VERSION" --notes $notes












