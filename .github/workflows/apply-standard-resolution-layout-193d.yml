name: Apply standard resolution dashboard layout 1.9.3d

on:
  workflow_dispatch:
  push:
    paths:
      - ".github/workflows/apply-standard-resolution-layout-193d.yml"

permissions:
  contents: write

jobs:
  apply:
    runs-on: windows-latest
    steps:
      - name: Quellcode laden
        uses: actions/checkout@v4

      - name: .NET 10 einrichten
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"

      - name: Standardgroessen-Layout anwenden
        shell: pwsh
        run: |
          $scriptBase64 = ""
          [IO.File]::WriteAllBytes("patch-standard-layout.py", [Convert]::FromBase64String($scriptBase64))
          python patch-standard-layout.py

      - name: Build
        shell: pwsh
        run: dotnet build "RaidClipPlugin/RaidClipPlugin.csproj" -c Release

      - name: Tests
        shell: pwsh
        run: dotnet test "RaidClipPlugin/Tests/RaidClipPlugin.Tests.csproj" -c Release

      - name: Aenderungen committen
        shell: pwsh
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add RaidClipPlugin/MainForm.DashboardModern.cs RaidClipPlugin/MainForm.cs RaidClipPlugin/MainForm.ModernShell.cs RaidClipPlugin/RaidClipPlugin.csproj
          git diff --cached --quiet
          if ($LASTEXITCODE -eq 0) {
            Write-Host "Keine Aenderungen zu committen."
            exit 0
          }
          git commit -m "Fix dashboard clipping at standard resolution"
          git push
