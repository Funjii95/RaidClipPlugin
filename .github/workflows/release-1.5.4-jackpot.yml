name: Release 1.5.4 Jackpot Command

on:
  push:
    paths:
      - ".github/workflows/release-1.5.4-jackpot.yml"

permissions:
  actions: write
  contents: write

jobs:
  apply-test-publish:
    runs-on: windows-latest
    steps:
      - name: Repository laden
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Änderungen anwenden
        shell: pwsh
        run: |
          $compressed = [Convert]::FromBase64String("")
          $inputStream = [IO.MemoryStream]::new($compressed)
          $gzip = [IO.Compression.GZipStream]::new($inputStream, [IO.Compression.CompressionMode]::Decompress)
          $reader = [IO.StreamReader]::new($gzip, [Text.UTF8Encoding]::new($false))
          $files = ($reader.ReadToEnd() | ConvertFrom-Json)
          $reader.Dispose()
          $gzip.Dispose()
          $inputStream.Dispose()
          foreach ($property in $files.PSObject.Properties) {
            $target = Join-Path $PWD $property.Name
            New-Item -ItemType Directory -Force (Split-Path $target -Parent) | Out-Null
            [IO.File]::WriteAllText($target, [string]$property.Value, [Text.UTF8Encoding]::new($false))
          }

      - name: .NET 10 einrichten
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"

      - name: Unit-Tests ausführen
        working-directory: RaidClipPlugin
        shell: pwsh
        run: dotnet test "Tests\RaidClipPlugin.Tests.csproj" -c Release

      - name: Version 1.5.4 übernehmen
        shell: pwsh
        run: |
          Remove-Item ".github/workflows/release-1.5.4-jackpot.yml"
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Jackpot-Chatcommand für Version 1.5.4 ergänzen"
          git push origin main

      - name: Release und Installer starten
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create v1.5.4 --target main --latest --title "RaidClipPlugin 1.5.4" --notes "Neu: !jackpot zeigt den aktuell gespeicherten Jackpot direkt im Twitch-Chat. Enthält außerdem das von den Spielen unabhängige Punktesystem aus Version 1.5.3."
          gh workflow run release.yml --repo Funjii95/RaidClipPlugin --ref v1.5.4
