name: Apply startup and dashboard fix 1.9.5c

on:
  workflow_dispatch:
  push:
    paths:
      - '.github/workflows/apply-startup-dashboard-fix-195c.yml'

permissions:
  contents: write

jobs:
  apply:
    runs-on: windows-latest
    steps:
      - name: Quellcode laden
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: .NET 10 einrichten
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Fix anwenden
        shell: pwsh
        run: |
          $scriptBase64 = ""
          [IO.File]::WriteAllBytes("patch-195.py", [Convert]::FromBase64String($scriptBase64))
          python patch-195.py

      - name: Build
        shell: pwsh
        run: dotnet build "RaidClipPlugin/RaidClipPlugin.csproj" -c Release

      - name: Tests
        shell: pwsh
        run: dotnet test "RaidClipPlugin/Tests/RaidClipPlugin.Tests.csproj" -c Release

      - name: Änderungen committen
        shell: pwsh
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add RaidClipPlugin
          git diff --cached --quiet
          if ($LASTEXITCODE -eq 0) {
            Write-Host "Keine Änderungen zu committen."
            exit 0
          }
          git commit -m "Fix startup when music requests fail and restore dashboard tiles"
          git push
