name: Apply clean dashboard layout 1.9.2

on:
  workflow_dispatch:
  push:
    paths:
      - ".github/workflows/apply-clean-dashboard-layout-192.yml"

permissions:
  contents: write

jobs:
  apply:
    runs-on: windows-latest
    steps:
      - name: Quellcode laden
        uses: actions/checkout@v4

      - name: .NET 10 einrichten
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"

      - name: Dashboard-Cleanup anwenden
        shell: pwsh
        run: |
          $scriptBase64 = ""
          [IO.File]::WriteAllBytes("patch-clean-dashboard.py", [Convert]::FromBase64String($scriptBase64))
          python patch-clean-dashboard.py

      - name: Build
        shell: pwsh
        run: dotnet build "RaidClipPlugin/RaidClipPlugin.csproj" -c Release

      - name: Tests
        shell: pwsh
        run: dotnet test "RaidClipPlugin/Tests/RaidClipPlugin.Tests.csproj" -c Release --no-build

      - name: Änderungen committen
        shell: pwsh
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add RaidClipPlugin/MainForm.DashboardModern.cs RaidClipPlugin/MainForm.cs RaidClipPlugin/MainForm.ModernShell.cs RaidClipPlugin/RaidClipPlugin.csproj
          git diff --cached --quiet
          if ($LASTEXITCODE -eq 0) {
            Write-Host "Keine Änderungen zu committen."
            exit 0
          }
          git commit -m "Clean dashboard layout"
          git push
