name: Release 1.5.6 Heist and Commands

on:
  push:
    branches: [main]
    paths:
      - .github/workflows/release-1.5.6-auto.yml

permissions:
  contents: write
  actions: write

jobs:
  implement-test-release:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'
      - name: Apply version 1.5.6 sources
        shell: pwsh
        env:
          PAYLOAD: 
        run: |
          @'
          import os, base64, gzip, json, pathlib
          files = json.loads(gzip.decompress(base64.b64decode(os.environ["PAYLOAD"])).decode("utf-8"))
          for name, content in files.items():
              path = pathlib.Path(name)
              path.parent.mkdir(parents=True, exist_ok=True)
              path.write_text(content, encoding="utf-8", newline="")
          print(f"Applied {len(files)} files")
          '@ | python -
      - name: Restore
        run: dotnet restore "RaidClipPlugin/Tests/RaidClipPlugin.Tests.csproj"
      - name: Build
        run: dotnet build "RaidClipPlugin/RaidClipPlugin.csproj" -c Release --no-restore
      - name: Test
        run: dotnet test "RaidClipPlugin/Tests/RaidClipPlugin.Tests.csproj" -c Release --no-restore
      - name: Commit version 1.5.6
        shell: pwsh
        run: |
          Remove-Item -LiteralPath ".github/workflows/release-1.5.6-auto.yml" -Force
          Remove-Item -LiteralPath ".github/workflows/release-1.5.6-heist.yml" -Force
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Version 1.5.6: Heist und zentrale Commands"
          git push origin main
          git tag -a v1.5.6 -m "RaidClipPlugin 1.5.6"
          git push origin v1.5.6
      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        shell: pwsh
        run: |
          gh release create v1.5.6 --title "RaidClipPlugin 1.5.6" --notes "Neues gemeinschaftliches Heist-Minispiel mit frei konfigurierbaren Commands, Erfolgschance, Berechtigungen, Cooldowns und atomarer Jackpot-Verteilung. Dazu kommen die zentrale CommandRegistry, ein Commands-Reiter, TXT-/JSON-Export und der neue Chatbefehl !commands mit Rollenprüfung, Seiten und Modulfiltern."
      - name: Build installer and update package
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh workflow run release.yml --ref v1.5.6
