name: Apply moderation center 1.9.4

on:
  workflow_dispatch:
  push:
    paths:
      - ".github/workflows/apply-moderation-center-194.yml"

permissions:
  contents: write

jobs:
  apply:
    runs-on: windows-latest
    steps:
      - name: Quellcode laden
        uses: actions/checkout@v4

      - name: .NET 10 einrichten
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"

      - name: Moderationscenter anwenden
        shell: pwsh
        run: |
          $scriptBase64 = ""
          [IO.File]::WriteAllBytes("patch-moderation-center.py", [Convert]::FromBase64String($scriptBase64))
          python patch-moderation-center.py

      - name: Build
        shell: pwsh
        run: dotnet build "RaidClipPlugin/RaidClipPlugin.csproj" -c Release

      - name: Tests
        shell: pwsh
        run: dotnet test "RaidClipPlugin/Tests/RaidClipPlugin.Tests.csproj" -c Release

      - name: Aenderungen committen
        shell: pwsh
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add RaidClipPlugin
          git diff --cached --quiet
          if ($LASTEXITCODE -eq 0) {
            Write-Host "Keine Aenderungen zu committen."
            exit 0
          }
          git commit -m "Add Twitch moderation center link filter"
          git push
