          $work = Join-Path $env:RUNNER_TEMP "raidclip-import"
          $zip = Join-Path $work "project.zip"
          $stage = Join-Path $work "stage"
          New-Item -ItemType Directory -Force $work | Out-Null
          [IO.File]::WriteAllBytes($zip, [Convert]::FromBase64String(($base64 -replace "\s", "")))
          Expand-Archive -Path $zip -DestinationPath $stage -Force
          if (Test-Path "RaidClipPlugin") { Remove-Item "RaidClipPlugin" -Recurse -Force }
          New-Item -ItemType Directory -Force "RaidClipPlugin" | Out-Null
          Get-ChildItem $stage -Force | Copy-Item -Destination "RaidClipPlugin" -Recurse -Force
          Remove-Item "RaidClipPlugin\.github" -Recurse -Force

      - name: .NET 10 einrichten
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"

      - name: Projekt vor Veröffentlichung prüfen
        shell: pwsh
        run: dotnet build "RaidClipPlugin\RaidClipPlugin.csproj" -c Release

      - name: Quellcode veröffentlichen und Tag setzen
        shell: pwsh
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Release 1.2.2"
          git push origin HEAD:main
          git tag -a "v1.2.2" -m "RaidClipPlugin 1.2.2"
          git push origin "v1.2.2"

      - name: Windows-App erstellen
        shell: pwsh
        run: dotnet publish "RaidClipPlugin\RaidClipPlugin.csproj" -c Release -r win-x64 --self-contained true -p:PublishSingleFile=true -p:EnableCompressionInSingleFile=true -o "RaidClipPlugin\publish"

      - name: Update-ZIP erstellen
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force "RaidClipPlugin\installer-output" | Out-Null
          Compress-Archive -Path "RaidClipPlugin\publish\*" -DestinationPath "RaidClipPlugin\installer-output\RaidClipPlugin-Update-1.2.2.zip" -Force

      - name: Inno Setup installieren
        shell: pwsh
        run: choco install innosetup -y --no-progress

      - name: Windows-Installer erstellen
        shell: pwsh
        run: '& "${env:ProgramFiles(x86)}\Inno Setup 6\ISCC.exe" "RaidClipPlugin\Installer\RaidClipPlugin.iss"'

      - name: update.json erzeugen
        shell: pwsh
        run: |
          $zipPath = "RaidClipPlugin\installer-output\RaidClipPlugin-Update-1.2.2.zip"
          $hash = (Get-FileHash $zipPath -Algorithm SHA256).Hash
          $manifest = [ordered]@{
            latestVersion = "1.2.2"
            downloadUrl = "https://github.com/Funjii95/RaidClipPlugin/releases/download/v1.2.2/RaidClipPlugin-Update-1.2.2.zip"
            changelog = "Sicherer Erststart, OBS-Quellenerstellung und GitHub-Auto-Updater."
            sha256 = $hash
          }
          $manifest | ConvertTo-Json | Set-Content "RaidClipPlugin\installer-output\update.json" -Encoding UTF8

      - name: GitHub Release erstellen
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "v1.2.2" --title "RaidClipPlugin 1.2.2" --generate-notes
          gh release upload "v1.2.2" "RaidClipPlugin\installer-output\RaidClipPlugin-Setup-1.2.2.exe" "RaidClipPlugin\installer-output\RaidClipPlugin-Update-1.2.2.zip" "RaidClipPlugin\installer-output\update.json" --clobber
